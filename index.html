<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire RPG - Realtime</title>
    
    <!-- Bibliotecas Base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Gun.js: Sincronização P2P estável via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .font-magic { font-family: 'Cinzel', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .input-hero {
            background: #020617 !important;
            border: 1px solid #1e293b !important;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            color: white !important;
            width: 100%;
            outline: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .input-hero:focus { border-color: #f97316 !important; background: #050a16 !important; }

        .editor-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }

        .editor-content {
            width: 100%;
            max-width: 1000px;
            height: fit-content;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- CONFIGURAÇÃO DA REDE (REFORÇADA) ---
        // Adicionando múltiplos relays para garantir que a sincronização não falhe
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://relay.peer.ooo/gun',
            'https://gun-us.herokuapp.com/gun',
            'https://gun-eu.herokuapp.com/gun'
        ]);

        // MESA_ID: O segredo da sua sala. Mude isto para ter salas privadas diferentes.
        const MESA_ID = 'grimoire-rpg-realtime-v15'; 
        const charactersDb = gun.get(MESA_ID).get('characters');

        const MASTER_KEY = "MESTRE123";

        // --- ÍCONES ---
        const Icons = {
            Shield: ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Plus: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            User: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Trash: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Edit: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Logout: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            History: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            X: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Loader: ({size=20}) => <svg className="animate-spin" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            Eye: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
        };

        function App() {
            const [nickname, setNickname] = useState(localStorage.getItem('rpg_nickname') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('rpg_nickname'));
            const [role, setRole] = useState(localStorage.getItem('rpg_role') || 'player');
            const [isOnline, setIsOnline] = useState(false);

            const [characters, setCharacters] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState(null);
            const [expandedCards, setExpandedCards] = useState({});
            const [storyCharId, setStoryCharId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [gmPass, setGmPass] = useState("");
            const [showGmLogin, setShowGmLogin] = useState(false);

            // 1. SINCRONIZAÇÃO EM TEMPO REAL (EFETIVA)
            useEffect(() => {
                if (!isLoggedIn) return;

                // Monitorar conexão
                gun.on('hi', () => setIsOnline(true));
                gun.on('bye', () => setIsOnline(false));

                // Escutar mudanças no banco de dados
                const listener = charactersDb.map().on((data, id) => {
                    if (!data) {
                        setCharacters(prev => prev.filter(c => c.id !== id));
                    } else {
                        // Atualiza a lista local garantindo que o ID está presente
                        setCharacters(prev => {
                            const filtered = prev.filter(c => c.id !== id);
                            const updated = { ...data, id };
                            return [...filtered, updated];
                        });
                    }
                });

                return () => charactersDb.off();
            }, [isLoggedIn]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!nickname.trim()) return;
                localStorage.setItem('rpg_nickname', nickname.trim());
                localStorage.setItem('rpg_role', 'player');
                setIsLoggedIn(true);
            };

            const handleGmLogin = (e) => {
                e.preventDefault();
                if (gmPass === MASTER_KEY) {
                    localStorage.setItem('rpg_nickname', 'Mestre');
                    localStorage.setItem('rpg_role', 'gm');
                    setNickname('Mestre');
                    setRole('gm');
                    setIsLoggedIn(true);
                } else alert("Chave proibida!");
            };

            const handleLogout = () => {
                localStorage.removeItem('rpg_nickname');
                localStorage.removeItem('rpg_role');
                window.location.reload();
            };

            const saveChar = () => {
                if (!formData.name?.trim()) return alert("O herói precisa de um nome!");
                setIsSaving(true);
                
                const id = editingId === 'new' ? Math.random().toString(36).substr(2, 9) : editingId;
                const payload = {
                    ...formData,
                    updatedAt: Date.now(),
                    ownerNickname: formData.ownerNickname || nickname
                };

                // No Gun.js usamos .put() para salvar
                charactersDb.get(id).put(payload, (ack) => {
                    if (ack.err) {
                        alert("Erro de rede ao salvar. Tente novamente.");
                    } else {
                        setEditingId(null);
                        setFormData(null);
                    }
                    setIsSaving(false);
                });
            };

            const deleteChar = (id) => {
                if (confirm("Deseja apagar este herói da crónica? Todos os jogadores deixarão de o ver.")) {
                    charactersDb.get(id).put(null);
                }
            };

            const updateStat = (id, field, delta, maxField) => {
                const char = characters.find(c => c.id === id);
                if (!char) return;
                let val = (Number(char[field]) || 0) + delta;
                if (maxField) val = Math.min(val, Number(char[maxField]) || 999);
                // Atualização pontual sincroniza instantaneamente
                charactersDb.get(id).get(field).put(Math.max(0, val));
            };

            const filtered = useMemo(() => {
                const sorted = [...characters].sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                if (role === 'gm') return sorted;
                return sorted.filter(c => !c.isHidden || c.ownerNickname?.toLowerCase() === nickname.toLowerCase());
            }, [characters, role, nickname]);

            const selectedStoryChar = characters.find(c => c.id === storyCharId);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                        <div className="glass-panel p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl border border-orange-500/10">
                            <div className="text-orange-500 mb-6 flex justify-center"><Icons.Shield size={48} /></div>
                            <h1 className="text-4xl font-magic font-black uppercase mb-10 text-white">Grimoire</h1>
                            {!showGmLogin ? (
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <input type="text" value={nickname} onChange={e => setNickname(e.target.value)} placeholder="Teu Nickname" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center font-bold text-white focus:border-orange-500 outline-none" />
                                    <button className="w-full bg-orange-600 p-4 rounded-xl font-black uppercase text-sm tracking-widest hover:bg-orange-500 shadow-lg">Entrar no Reino</button>
                                    <button type="button" onClick={() => setShowGmLogin(true)} className="text-slate-500 hover:text-orange-400 text-xs uppercase font-bold transition tracking-widest">Painel do Mestre</button>
                                </form>
                            ) : (
                                <form onSubmit={handleGmLogin} className="space-y-6">
                                    <input type="password" value={gmPass} onChange={e => setGmPass(e.target.value)} placeholder="Chave do Mestre" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center font-bold text-white focus:border-orange-500 outline-none" />
                                    <button className="w-full bg-white text-slate-950 p-4 rounded-xl font-black uppercase text-sm tracking-widest">Ascender</button>
                                    <button type="button" onClick={() => setShowGmLogin(false)} className="text-slate-500 text-xs font-bold uppercase tracking-widest leading-none mt-4">Voltar</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-[1600px] mx-auto p-4 md:p-12 animate-in min-h-screen">
                    <header className="flex flex-col md:flex-row justify-between items-center gap-8 mb-16">
                        <div className="flex items-center gap-6">
                            <div className="relative">
                                <div className="text-orange-500 p-4 glass-panel rounded-2xl shadow-xl border border-orange-500/20"><Icons.Shield size={32} /></div>
                                <div className={`absolute -top-1 -right-1 w-4 h-4 rounded-full border-2 border-slate-900 shadow-lg ${isOnline ? 'bg-emerald-500' : 'bg-red-500 animate-pulse'}`} title={isOnline ? "Online" : "A conectar..."}></div>
                            </div>
                            <div>
                                <h1 className="text-5xl font-magic font-black uppercase text-white leading-none tracking-tight">Grimoire</h1>
                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mt-2 italic flex items-center gap-2">
                                    {nickname} • Realtime Mode
                                </p>
                            </div>
                        </div>
                        <button onClick={handleLogout} className="p-4 glass-panel rounded-[1.2rem] text-slate-500 hover:text-red-500 transition-all border-white/5 shadow-lg"><Icons.Logout size={24}/></button>
                    </header>

                    <div className="flex justify-between items-center mb-12">
                        <div className="glass-panel px-8 py-3 rounded-full flex items-center gap-4 border-orange-500/10 shadow-inner">
                            <Icons.User />
                            <span className="font-magic font-black uppercase text-xs tracking-widest leading-none">{filtered.length} Registos na Nuvem</span>
                        </div>
                        <button onClick={() => { setFormData({ name: "", hp: 10, hpMax: 10, slots: 2, slotsMax: 2, speed: 9, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 1, ownerNickname: role === 'gm' ? "" : nickname, isHidden: false }); setEditingId('new'); }} className="bg-orange-600 p-6 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all shadow-orange-950/40"><Icons.Plus /></button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 pb-20">
                        {filtered.length === 0 ? <div className="col-span-full py-20 text-center glass-panel rounded-[4rem] border-dashed border-2 border-slate-800 opacity-20 font-magic text-xl uppercase italic tracking-widest italic">Aguardando que o Mestre ou Jogadores tragam heróis...</div> : 
                        filtered.map(char => {
                            const isOwner = char.ownerNickname?.toLowerCase() === nickname.toLowerCase();
                            const hasFullAccess = isOwner || role === 'gm';
                            const isExp = expandedCards[char.id];
                            return (
                                <div key={char.id} className={`glass-panel rounded-[3.5rem] overflow-hidden transition-all duration-500 border-2 ${isOwner ? 'border-orange-500/30 shadow-orange-900/10' : 'border-transparent'} group/card flex flex-col shadow-2xl`}>
                                    <div className="relative h-72 bg-slate-950 overflow-hidden border-b border-white/5">
                                        {char.imageUrl ? <img src={char.imageUrl} className="w-full h-full object-cover opacity-80 group-hover/card:scale-105 transition-all duration-1000" alt={char.name} /> : <div className="h-full flex items-center justify-center opacity-10 text-slate-800"><Icons.User size={64} /></div>}
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-transparent to-transparent"></div>
                                        <div className="absolute top-4 left-4 flex gap-2">
                                            {char.isHidden && <div className="bg-purple-600 p-2 rounded-full text-white shadow-xl border border-purple-400"><Icons.Shield size={14}/></div>}
                                            {isOwner && <div className="bg-orange-500 text-slate-950 font-black px-3 py-1 rounded-full text-[8px] uppercase tracking-widest shadow-lg">MEU HERÓI</div>}
                                        </div>
                                        {hasFullAccess && (
                                            <button onClick={() => setStoryCharId(char.id)} className="absolute bottom-4 right-6 text-white/40 font-magic uppercase text-[8px] tracking-widest opacity-0 group-hover/card:opacity-100 transition-all flex items-center gap-2 italic leading-none hover:text-white">
                                                Ler Crónica <Icons.History />
                                            </button>
                                        )}
                                    </div>
                                    <div className="p-10">
                                        <div className="flex justify-between items-start mb-8 gap-4 text-white">
                                            <div>
                                                <h3 className="text-3xl font-magic font-black uppercase italic mb-2 leading-none tracking-tight">{char.name}</h3>
                                                <div className="flex items-center gap-4 text-[9px] font-black uppercase text-slate-500 tracking-widest italic leading-none mt-1"><span>Dono: {char.ownerNickname}</span><span className="flex items-center gap-2 text-emerald-500 bg-emerald-500/5 px-2 py-0.5 rounded border border-emerald-500/10 shadow-inner">V: {char.speed}m</span></div>
                                            </div>
                                            <div className="flex gap-1.5">
                                                {role === 'gm' && <button onClick={() => charactersDb.get(char.id).get('isHidden').put(!char.isHidden)} className={`p-2.5 rounded-xl glass-panel ${char.isHidden ? 'text-purple-400 border-purple-500/20' : 'text-slate-500'}`}><Icons.Shield size={16}/></button>}
                                                {hasFullAccess && (
                                                    <>
                                                        <button onClick={() => { setEditingId(char.id); setFormData(char); }} className="p-2.5 rounded-xl glass-panel text-orange-500 hover:bg-orange-500/10 transition-all shadow-inner"><Icons.Edit /></button>
                                                        {role === 'gm' && <button onClick={() => deleteChar(char.id)} className="p-2.5 rounded-xl glass-panel text-red-500 hover:bg-red-500/10"><Icons.Trash /></button>}
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-8 mb-10">
                                            <StatusBar label="Vida" val={char.hp} max={char.hpMax} col="red" edit={hasFullAccess} onDelta={d => updateStat(char.id, 'hp', d, 'hpMax')} />
                                            <StatusBar label="Magia" val={char.slots} max={char.slotsMax} col="sky" edit={hasFullAccess} onDelta={d => updateStat(char.id, 'slots', d, 'slotsMax')} />
                                        </div>
                                        {hasFullAccess && (
                                            <div className="space-y-10 animate-in">
                                                <div className="grid grid-cols-6 gap-2">
                                                    {['str','dex','con','int','wis','cha'].map(a => (
                                                        <div key={a} className="glass-panel py-3 rounded-2xl text-center shadow-inner group/stat hover:border-orange-500/20 transition-all">
                                                            <p className="text-[9px] font-black text-slate-600 uppercase mb-1 italic group-hover/stat:text-orange-500 leading-none">{a}</p>
                                                            <p className="text-xl font-black font-magic text-white leading-none">{char[a] || 10}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                                <button onClick={() => setExpandedCards(p => ({...p, [char.id]: !p[char.id]}))} className={`w-full p-5 rounded-[2rem] font-magic font-black uppercase text-[9px] tracking-[0.4em] transition-all flex justify-between items-center ${isExp ? 'bg-orange-600 text-white shadow-xl shadow-orange-950/40' : 'glass-panel text-slate-500'}`}>
                                                    <span>Inventário & Habilidades</span>
                                                    <span>{isExp ? '▲' : '▼'}</span>
                                                </button>
                                                {isExp && (
                                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-10 mt-12 animate-in">
                                                        <div className="space-y-10">
                                                            <ListBlock title="Perícias" content={char.skills} />
                                                            <ListBlock title="Saberes" content={char.abilities} />
                                                        </div>
                                                        <div className="glass-panel p-8 rounded-[3rem] shadow-inner h-fit bg-slate-900/40 border-white/5">
                                                            <h4 className="font-magic font-black uppercase text-[10px] text-orange-500 mb-6 tracking-widest flex items-center gap-3 italic leading-none">Mochila</h4>
                                                            <p className="text-sm text-slate-400 italic leading-relaxed whitespace-pre-wrap">{char.inventory || "Bolsas vazias."}</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )
                        })}
                    </div>

                    {/* MODAL EDITOR: ABSOLUTAMENTE CENTRALIZADO E COMPACTO */}
                    {editingId && formData && (
                        <div className="editor-overlay">
                            <div className="editor-content glass-panel animate-in">
                                <div className="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/80">
                                    <div className="flex items-center gap-3 text-orange-500 font-magic italic leading-none"><Icons.Shield size={24}/> <h2 className="text-xl uppercase tracking-tighter leading-none">Forjar Destino</h2></div>
                                    <button onClick={() => setEditingId(null)} className="p-2 text-slate-400 hover:text-white transition-all"><Icons.X size={20} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 lg:p-10 custom-scrollbar bg-[#020617]/50">
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                        <div className="lg:col-span-4 space-y-6">
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1 leading-none italic">Identidade</label><input type="text" value={formData.name || ""} onChange={e => setFormData({...formData, name: e.target.value})} className="input-hero font-magic font-black uppercase text-lg text-orange-500" placeholder="..." /></div>
                                            <label className="flex flex-col items-center justify-center h-56 bg-slate-950 border-2 border-dashed border-slate-800 hover:border-orange-500/50 rounded-2xl cursor-pointer transition-all group overflow-hidden relative text-center">
                                                {formData.imageUrl ? <img src={formData.imageUrl} className="w-full h-full object-cover" alt="Portrait" /> : <div className="text-slate-800 group-hover:text-orange-500"><Icons.Plus size={40}/></div>}
                                                {!formData.imageUrl && <span className="text-[9px] font-black uppercase mt-3 text-slate-600 tracking-widest leading-none">Imagem do Viajante</span>}
                                                <input type="file" accept="image/*" className="hidden" onChange={e => {
                                                    const f = e.target.files[0]; if(!f) return;
                                                    const r = new FileReader();
                                                    r.onload = ev => {
                                                        const i = new Image(); i.onload = () => {
                                                            const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = i.height * (400/i.width);
                                                            canvas.getContext('2d').drawImage(i, 0, 0, canvas.width, canvas.height);
                                                            setFormData(fd => ({ ...fd, imageUrl: canvas.toDataURL('image/jpeg', 0.6) }));
                                                        }; i.src = ev.target.result;
                                                    }; r.readAsDataURL(f);
                                                }} />
                                            </label>
                                            <div className="grid grid-cols-3 gap-2">
                                                <div className="text-center space-y-1"><label className="text-[8px] uppercase text-slate-600 block leading-none">Nível</label><input type="number" value={formData.level} onChange={e=>setFormData({...formData, level: e.target.value})} className="input-hero text-center font-bold" /></div>
                                                <div className="text-center space-y-1"><label className="text-[8px] uppercase text-slate-600 block leading-none">Veloc.</label><input type="number" value={formData.speed} onChange={e=>setFormData({...formData, speed: e.target.value})} className="input-hero text-center font-bold" /></div>
                                                <div className="text-center space-y-1"><label className="text-[8px] uppercase text-slate-600 block leading-none">Dono</label><input type="text" disabled={role!=='gm'} value={formData.ownerNickname} onChange={e=>setFormData({...formData, ownerNickname: e.target.value})} className="input-hero text-center text-[9px] text-orange-500 uppercase font-black" /></div>
                                            </div>
                                        </div>
                                        <div className="lg:col-span-8 space-y-10">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 text-white font-black">
                                                <div className="bg-[#020617] border border-white/5 p-6 rounded-2xl text-center shadow-inner group/hp">
                                                    <label className="text-[10px] uppercase text-red-500 block mb-4 italic opacity-60 leading-none">Vitalidade Máxima</label>
                                                    <div className="flex justify-center items-center gap-4 font-magic font-black text-4xl text-red-500"><input type="number" value={formData.hpMax} onChange={e=>setFormData({...formData, hpMax: e.target.value, hp: e.target.value})} className="w-24 bg-transparent text-center outline-none focus:text-white" /></div>
                                                </div>
                                                <div className="bg-[#020617] border border-white/5 p-6 rounded-2xl text-center shadow-inner group/mag">
                                                    <label className="text-[10px] uppercase text-sky-500 block mb-4 italic opacity-60 leading-none">Magia Máxima</label>
                                                    <div className="flex justify-center items-center gap-4 font-magic font-black text-4xl text-sky-400"><input type="number" value={formData.slotsMax} onChange={e=>setFormData({...formData, slotsMax: e.target.value, slots: e.target.value})} className="w-24 bg-transparent text-center outline-none focus:text-white" /></div>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-6 gap-3 text-white font-black">{['str','dex','con','int','wis','cha'].map(a => (<div key={a} className="space-y-1"><label className="text-[9px] uppercase text-slate-500 text-center block italic leading-none">{a}</label><input type="number" value={formData[a]} onChange={e=>setFormData({...formData, [a]: e.target.value})} className="input-hero text-center font-black text-xl p-3" /></div>))}</div>
                                            <div className="space-y-2"><label className="text-[10px] uppercase text-slate-500 italic ml-2 block tracking-widest leading-none">Crónica do Herói</label><textarea value={formData.history || ""} onChange={e=>setFormData({...formData, history: e.target.value})} className="input-hero h-32 text-base font-serif italic custom-scrollbar resize-none leading-relaxed p-6" /></div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8"><div className="space-y-2"><label className="text-[10px] uppercase text-slate-500 italic ml-2 block leading-none tracking-widest text-white">Perícias</label><textarea value={formData.skills || ""} onChange={e=>setFormData({...formData, skills: e.target.value})} className="input-hero h-44 text-sm custom-scrollbar resize-none p-4" placeholder="Nome: Desc;" /></div><div className="space-y-2"><label className="text-[10px] uppercase text-slate-500 italic ml-2 block leading-none tracking-widest text-white">Saberes</label><textarea value={formData.abilities || ""} onChange={e=>setFormData({...formData, abilities: e.target.value})} className="input-hero h-44 text-sm custom-scrollbar resize-none p-4" placeholder="Nome: Desc;" /></div></div>
                                            <div className="space-y-2"><label className="text-[10px] uppercase text-slate-500 italic ml-2 block leading-none tracking-widest text-white">Mochila</label><textarea value={formData.inventory || ""} onChange={e=>setFormData({...formData, inventory: e.target.value})} className="input-hero h-44 text-sm custom-scrollbar resize-none p-6" /></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 border-t border-white/10 bg-slate-900/90 flex justify-center">
                                    <button onClick={saveChar} disabled={isSaving} className="w-full max-w-xl bg-orange-600 p-5 rounded-2xl text-2xl font-magic font-black uppercase tracking-[0.5em] shadow-xl hover:bg-orange-500 transition-all flex justify-center items-center gap-6 active:scale-95 leading-none">
                                        {isSaving ? <Icons.Loader size={28} /> : <Icons.Shield size={28} />} Selar Escritura
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Modal Crónica */}
                    {selectedStoryChar && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[2000] flex items-center justify-center p-6" onClick={() => setStoryCharId(null)}>
                            <div className="bg-[#050505] border border-white/10 w-full max-w-2xl rounded-3xl p-10 lg:p-14 relative shadow-2xl animate-pop max-h-[85vh] overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setStoryCharId(null)} className="absolute top-8 right-8 text-slate-500 hover:text-white transition-transform hover:rotate-90 p-2"><Icons.X size={20}/></button>
                                <div className="text-orange-500 mb-8 font-magic"><Icons.History size={40}/></div>
                                <h2 className="text-4xl font-magic font-black uppercase text-white mb-10 border-b border-white/5 pb-8 italic tracking-tighter leading-none">Crónica: {selectedStoryChar.name}</h2>
                                <div className="text-slate-200 italic font-serif leading-loose text-xl whitespace-pre-wrap">{selectedStoryChar.history || "História nula."}</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SUB-COMPONENTES AUXILIARES ---
        function StatusBar({ label, val, max, col, edit, onDelta }) {
            const bar = col === 'red' ? 'from-red-800 to-red-400' : 'from-sky-800 to-sky-400';
            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center px-1 font-magic uppercase italic leading-none text-white">
                        <span className={`text-${col}-500 text-[10px] font-black tracking-widest`}>{label}</span>
                        <div className="flex items-center gap-4">
                            {edit && <button onClick={()=>onDelta(-1)} className="text-slate-700 hover:text-white transition-all text-xl font-black outline-none leading-none">-</button>}
                            <span className="text-3xl font-black tabular-nums leading-none">{val} <span className="text-slate-700 text-base">/ {max}</span></span>
                            {edit && <button onClick={()=>onDelta(1)} className="text-slate-700 hover:text-white transition-all text-xl font-black outline-none leading-none">+</button>}
                        </div>
                    </div>
                    <div className="h-3 bg-slate-950 rounded-full border border-slate-800 overflow-hidden p-[2px] shadow-inner leading-none"><div className={`h-full bg-gradient-to-r ${bar} rounded-full transition-all duration-1000 ease-out`} style={{width: `${Math.min(100, (val/max)*100)}%`}} /></div>
                </div>
            );
        }

        function ListBlock({ title, content }) {
            const items = useMemo(() => !content ? [] : content.split(';').map(x => { const [n,d] = x.split(':'); return {n:n?.trim(), d:d?.trim()}; }).filter(x => x.n), [content]);
            return (
                <div className="w-full">
                    <h4 className="font-magic font-black uppercase text-[10px] text-orange-500 mb-6 tracking-widest italic leading-none">{title}</h4>
                    <div className="glass-panel p-8 rounded-[2.5rem] shadow-inner flex flex-wrap gap-4 min-h-[100px] border-white/5 bg-slate-950/20 leading-none">
                        {items.length > 0 ? items.map((i, k) => (
                            <div key={k} className="relative group/item leading-none">
                                <div className="bg-slate-900 border border-slate-800 px-5 py-3 rounded-2xl text-xs font-black uppercase text-slate-300 italic cursor-help hover:border-orange-500/40 shadow-xl transition-all leading-none">
                                    {i.n}
                                </div>
                                {i.d && (
                                    <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-6 w-80 p-8 bg-[#0a0a0a] border border-orange-500/30 rounded-[2.5rem] tooltip-box opacity-0 invisible group-hover/item:opacity-100 group-hover/item:visible transition-all duration-300 z-[2000] pointer-events-none text-left shadow-[0_40px_80px_rgba(0,0,0,0.9)] border-b-8 border-b-orange-600 leading-normal">
                                        <p className="text-[11px] font-black text-orange-500 uppercase mb-4 border-b border-white/5 pb-4 italic tracking-widest leading-none">{i.n}</p>
                                        <p className="text-[15px] text-slate-300 font-medium italic leading-relaxed">{i.d}</p>
                                    </div>
                                )}
                            </div>
                        )) : <span className="text-[10px] text-slate-700 font-black uppercase tracking-widest italic leading-none">Vazio.</span>}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
