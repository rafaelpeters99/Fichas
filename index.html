<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire RPG - Lobby Online</title>
    
    <!-- Bibliotecas Base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Gun.js -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .font-magic { font-family: 'Cinzel', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .input-hero {
            background: #020617 !important;
            border: 1px solid #1e293b !important;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            color: white !important;
            width: 100%;
            outline: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .input-hero:focus { border-color: #f97316 !important; background: #050a16 !important; }

        .editor-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }

        .editor-content {
            width: 100%;
            max-width: 1000px;
            height: fit-content;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8);
        }

        .room-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .room-card:hover {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.05);
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURAÇÃO DA REDE GUN ---
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://relay.peer.ooo/gun',
            'https://gunjs.herokuapp.com/gun'
        ]);

        // Nós Globais
        const globalRegistry = gun.get('grimoire-rpg-global-rooms-v1');
        const MASTER_KEY = "MESTRE123";

        // --- ÍCONES ---
        const Icons = {
            Shield: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Plus: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            User: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Trash: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Edit: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Door: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>,
            Loader: ({size=20}) => <svg className="animate-spin" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            X: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        };

        function App() {
            // Sessão
            const [nickname, setNickname] = useState(localStorage.getItem('rpg_nickname') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('rpg_nickname'));
            const [role, setRole] = useState(localStorage.getItem('rpg_role') || 'player');
            
            // Salas
            const [rooms, setRooms] = useState([]);
            const [currentRoom, setCurrentRoom] = useState(null);
            const [isCreatingRoom, setIsCreatingRoom] = useState(false);
            const [newRoomName, setNewRoomName] = useState("");

            // Heróis
            const [characters, setCharacters] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState(null);
            const [expandedCards, setExpandedCards] = useState({});
            const [isSaving, setIsSaving] = useState(false);
            const [gmPass, setGmPass] = useState("");
            const [showGmLogin, setShowGmLogin] = useState(false);

            // 1. SINCRONIZAÇÃO DA LISTA DE SALAS (GLOBAL)
            useEffect(() => {
                if (!isLoggedIn) return;
                
                const unsub = globalRegistry.map().on((data, id) => {
                    if (data) {
                        setRooms(prev => {
                            const others = prev.filter(r => r.id !== id);
                            return [...others, { ...data, id }].sort((a,b) => b.createdAt - a.createdAt);
                        });
                    }
                });
                return () => globalRegistry.off();
            }, [isLoggedIn]);

            // 2. SINCRONIZAÇÃO DE HERÓIS (DENTRO DA SALA SELECIONADA)
            useEffect(() => {
                if (!currentRoom) {
                    setCharacters([]);
                    return;
                }

                const roomDb = gun.get(currentRoom.id).get('characters');
                const unsub = roomDb.map().on((data, id) => {
                    if (!data) {
                        setCharacters(prev => prev.filter(c => c.id !== id));
                    } else {
                        setCharacters(prev => {
                            const others = prev.filter(c => c.id !== id);
                            return [...others, { ...data, id }].sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                        });
                    }
                });
                return () => roomDb.off();
            }, [currentRoom]);

            // --- AÇÕES ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (!nickname.trim()) return;
                localStorage.setItem('rpg_nickname', nickname.trim());
                localStorage.setItem('rpg_role', 'player');
                setIsLoggedIn(true);
            };

            const handleGmLogin = (e) => {
                e.preventDefault();
                if (gmPass === MASTER_KEY) {
                    localStorage.setItem('rpg_nickname', 'Mestre');
                    localStorage.setItem('rpg_role', 'gm');
                    setNickname('Mestre');
                    setRole('gm');
                    setIsLoggedIn(true);
                } else alert("Chave proibida!");
            };

            const createRoom = () => {
                if (role !== 'gm') return;
                if (!newRoomName.trim()) return;
                
                const roomId = 'room-' + Math.random().toString(36).substr(2, 9);
                globalRegistry.get(roomId).put({
                    name: newRoomName.trim(),
                    createdAt: Date.now(),
                    master: nickname
                });
                setNewRoomName("");
                setIsCreatingRoom(false);
            };

            const saveChar = () => {
                if (!formData.name?.trim()) return alert("O herói precisa de um nome!");
                setIsSaving(true);
                
                const roomDb = gun.get(currentRoom.id).get('characters');
                const id = editingId === 'new' ? Math.random().toString(36).substr(2, 9) : editingId;
                
                roomDb.get(id).put({
                    ...formData,
                    updatedAt: Date.now(),
                    ownerNickname: formData.ownerNickname || nickname
                }, () => {
                    setIsSaving(false);
                    setEditingId(null);
                    setFormData(null);
                });
            };

            const deleteChar = (id) => {
                if (confirm("Apagar herói?")) {
                    gun.get(currentRoom.id).get('characters').get(id).put(null);
                }
            };

            const updateStat = (id, field, delta, maxField) => {
                const char = characters.find(c => c.id === id);
                if (!char) return;
                let val = (Number(char[field]) || 0) + delta;
                if (maxField) val = Math.min(val, Number(char[maxField]) || 999);
                gun.get(currentRoom.id).get('characters').get(id).get(field).put(Math.max(0, val));
            };

            // --- TELAS ---
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                        <div className="glass-panel p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
                            <div className="text-orange-500 mb-6 flex justify-center"><Icons.Shield size={48} /></div>
                            <h1 className="text-4xl font-magic font-black uppercase mb-10 text-white">Grimoire</h1>
                            {!showGmLogin ? (
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <input type="text" value={nickname} onChange={e => setNickname(e.target.value)} placeholder="Teu Nickname" className="input-hero text-center" />
                                    <button className="w-full bg-orange-600 p-4 rounded-xl font-black uppercase text-sm hover:bg-orange-500">Entrar</button>
                                    <button type="button" onClick={() => setShowGmLogin(true)} className="text-slate-500 text-xs font-bold uppercase mt-4">Sou Mestre</button>
                                </form>
                            ) : (
                                <form onSubmit={handleGmLogin} className="space-y-6">
                                    <input type="password" value={gmPass} onChange={e => setGmPass(e.target.value)} placeholder="Chave do Mestre" className="input-hero text-center" />
                                    <button className="w-full bg-white text-slate-950 p-4 rounded-xl font-black uppercase text-sm">Validar</button>
                                    <button type="button" onClick={() => setShowGmLogin(false)} className="text-slate-500 text-xs font-bold uppercase mt-4">Voltar</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            // MENU DE SALAS (LOBBY)
            if (!currentRoom) {
                return (
                    <div className="max-w-[800px] mx-auto p-8 md:p-20 animate-in min-h-screen">
                        <header className="flex justify-between items-center mb-16">
                            <div>
                                <h1 className="text-4xl font-magic font-black uppercase text-white">Salas</h1>
                                <p className="text-xs text-slate-500 uppercase tracking-widest mt-2">Escolhe a tua seção • {nickname}</p>
                            </div>
                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="text-slate-600 hover:text-red-500 uppercase text-[10px] font-black tracking-widest">Sair</button>
                        </header>

                        <div className="grid grid-cols-1 gap-6">
                            {role === 'gm' && (
                                <button onClick={() => setIsCreatingRoom(true)} className="glass-panel p-8 rounded-3xl border-dashed border-2 border-slate-800 hover:border-orange-500/40 transition-all flex flex-col items-center gap-4 group">
                                    <div className="bg-orange-600/10 p-4 rounded-full text-orange-500 group-hover:scale-110 transition-transform"><Icons.Plus size={32}/></div>
                                    <span className="font-magic font-black uppercase text-sm tracking-widest">Forjar Nova Sala</span>
                                </button>
                            )}

                            {rooms.length === 0 ? (
                                <div className="py-20 text-center opacity-20 font-magic uppercase italic">Nenhuma sala ativa no momento...</div>
                            ) : rooms.map(room => (
                                <div key={room.id} onClick={() => setCurrentRoom(room)} className="glass-panel p-8 rounded-3xl room-card flex justify-between items-center group">
                                    <div className="flex items-center gap-6">
                                        <div className="text-orange-500/40 group-hover:text-orange-500"><Icons.Shield size={32}/></div>
                                        <div>
                                            <h3 className="text-2xl font-magic font-black uppercase text-white leading-none">{room.name}</h3>
                                            <p className="text-[10px] text-slate-500 uppercase font-black mt-2 tracking-widest italic">Mestre: {room.master}</p>
                                        </div>
                                    </div>
                                    <div className="text-slate-700 group-hover:text-white"><Icons.Door size={24}/></div>
                                </div>
                            ))}
                        </div>

                        {/* MODAL CRIAR SALA */}
                        {isCreatingRoom && (
                            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[1000] flex items-center justify-center p-6">
                                <div className="glass-panel p-10 rounded-3xl w-full max-w-sm text-center">
                                    <h2 className="text-xl font-magic font-black uppercase text-orange-500 mb-8 tracking-widest">Nova Sessão</h2>
                                    <input autoFocus type="text" value={newRoomName} onChange={e => setNewRoomName(e.target.value)} placeholder="Nome da Mesa..." className="input-hero text-center mb-6" />
                                    <div className="flex gap-4">
                                        <button onClick={() => setIsCreatingRoom(false)} className="flex-1 bg-slate-900 p-4 rounded-xl text-[10px] font-black uppercase text-slate-500">Cancelar</button>
                                        <button onClick={createRoom} className="flex-1 bg-orange-600 p-4 rounded-xl text-[10px] font-black uppercase text-white shadow-lg">Criar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // DENTRO DA SALA (SISTEMA DE FICHAS)
            return (
                <div className="max-w-[1600px] mx-auto p-4 md:p-12 animate-in min-h-screen">
                    <header className="flex justify-between items-center mb-16">
                        <div className="flex items-center gap-6">
                            <div className="text-orange-500 p-4 glass-panel rounded-2xl border border-orange-500/20"><Icons.Shield size={32} /></div>
                            <div>
                                <h1 className="text-5xl font-magic font-black uppercase text-white leading-none">{currentRoom.name}</h1>
                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mt-2 italic">{nickname} • Sala de Jogo</p>
                            </div>
                        </div>
                        <button onClick={() => setCurrentRoom(null)} className="p-4 glass-panel rounded-xl text-slate-500 hover:text-orange-500 flex items-center gap-3">
                            <Icons.Door size={20}/> <span className="text-[10px] font-black uppercase tracking-widest">Mudar Sala</span>
                        </button>
                    </header>

                    <div className="flex justify-between items-center mb-12">
                        <div className="glass-panel px-8 py-3 rounded-full flex items-center gap-4 border-orange-500/10">
                            <Icons.User />
                            <span className="font-magic font-black uppercase text-xs tracking-widest">{characters.length} Registos Online</span>
                        </div>
                        <button onClick={() => { setFormData({ name: "", hp: 10, hpMax: 10, slots: 2, slotsMax: 2, speed: 9, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 1, ownerNickname: role === 'gm' ? "" : nickname, isHidden: false }); setEditingId('new'); }} className="bg-orange-600 p-6 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all"><Icons.Plus /></button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                        {characters.length === 0 ? <div className="col-span-full py-20 text-center glass-panel rounded-[4rem] border-dashed border-2 border-slate-800 opacity-20 font-magic text-xl uppercase italic">Nenhum herói nesta mesa ainda...</div> : 
                        characters.filter(c => role === 'gm' || (!c.isHidden || c.ownerNickname?.toLowerCase() === nickname.toLowerCase())).map(char => {
                            const isOwner = char.ownerNickname?.toLowerCase() === nickname.toLowerCase();
                            const hasAccess = isOwner || role === 'gm';
                            return (
                                <div key={char.id} className={`glass-panel rounded-[3.5rem] overflow-hidden transition-all duration-500 border-2 ${isOwner ? 'border-orange-500/30 shadow-orange-900/10' : 'border-transparent'} group flex flex-col shadow-2xl`}>
                                    <div className="relative h-64 bg-slate-950 overflow-hidden border-b border-white/5">
                                        {char.imageUrl ? <img src={char.imageUrl} className="w-full h-full object-cover opacity-80" alt={char.name} /> : <div className="h-full flex items-center justify-center opacity-10 text-slate-800"><Icons.User size={64} /></div>}
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-transparent to-transparent"></div>
                                        <div className="absolute top-4 left-4 flex gap-2">
                                            {char.isHidden && <div className="bg-purple-600 p-2 rounded-full text-white"><Icons.Shield size={14}/></div>}
                                            {isOwner && <div className="bg-orange-500 text-slate-950 font-black px-3 py-1 rounded-full text-[8px] uppercase">MEU HERÓI</div>}
                                        </div>
                                    </div>
                                    <div className="p-10">
                                        <div className="flex justify-between items-start mb-8 gap-4">
                                            <div>
                                                <h3 className="text-3xl font-magic font-black uppercase italic text-white mb-2 leading-none">{char.name}</h3>
                                                <div className="flex items-center gap-4 text-[9px] font-black uppercase text-slate-500 tracking-widest mt-1"><span>{char.ownerNickname}</span><span className="flex items-center gap-2 text-emerald-500">V: {char.speed}m</span></div>
                                            </div>
                                            <div className="flex gap-1.5">
                                                {role === 'gm' && <button onClick={() => gun.get(currentRoom.id).get('characters').get(char.id).get('isHidden').put(!char.isHidden)} className={`p-2.5 rounded-xl glass-panel ${char.isHidden ? 'text-purple-400' : 'text-slate-500'}`}><Icons.Shield/></button>}
                                                {hasAccess && (
                                                    <>
                                                        <button onClick={() => { setEditingId(char.id); setFormData(char); }} className="p-2.5 rounded-xl glass-panel text-orange-500 shadow-inner"><Icons.Edit /></button>
                                                        {role === 'gm' && <button onClick={() => deleteChar(char.id)} className="p-2.5 rounded-xl glass-panel text-red-500"><Icons.Trash /></button>}
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-8 mb-10">
                                            <StatusBar label="Vida" val={char.hp} max={char.hpMax} col="red" edit={hasAccess} onDelta={d => updateStat(char.id, 'hp', d, 'hpMax')} />
                                            <StatusBar label="Magia" val={char.slots} max={char.slotsMax} col="sky" edit={hasAccess} onDelta={d => updateStat(char.id, 'slots', d, 'slotsMax')} />
                                        </div>
                                    </div>
                                </div>
                            )
                        })}
                    </div>

                    {/* EDITOR MODAL */}
                    {editingId && formData && (
                        <div className="editor-overlay">
                            <div className="editor-content glass-panel animate-in">
                                <div className="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/80">
                                    <div className="flex items-center gap-3 text-orange-500 font-magic italic"><Icons.Shield size={24}/> <h2 className="text-xl uppercase tracking-tighter leading-none">Forjar Destino</h2></div>
                                    <button onClick={() => setEditingId(null)} className="p-2 text-slate-400 hover:text-white transition-all"><Icons.X size={18} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 lg:p-10 custom-scrollbar bg-[#020617]/50">
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                        <div className="lg:col-span-4 space-y-6">
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1 leading-none italic">Nome do Herói</label><input type="text" value={formData.name || ""} onChange={e => setFormData({...formData, name: e.target.value})} className="input-hero font-magic font-black uppercase text-lg text-orange-500" placeholder="..." /></div>
                                            <label className="flex flex-col items-center justify-center h-56 bg-slate-950 border-2 border-dashed border-slate-800 hover:border-orange-500/50 rounded-2xl cursor-pointer transition-all group overflow-hidden relative text-center">
                                                {formData.imageUrl ? <img src={formData.imageUrl} className="w-full h-full object-cover" /> : <div className="text-slate-800 group-hover:text-orange-500"><Icons.Plus size={40}/></div>}
                                                <input type="file" accept="image/*" className="hidden" onChange={e => {
                                                    const f = e.target.files[0]; if(!f) return;
                                                    const r = new FileReader();
                                                    r.onload = ev => {
                                                        const i = new Image(); i.onload = () => {
                                                            const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = i.height * (300/i.width);
                                                            canvas.getContext('2d').drawImage(i, 0, 0, canvas.width, canvas.height);
                                                            setFormData(fd => ({ ...fd, imageUrl: canvas.toDataURL('image/jpeg', 0.4) }));
                                                        }; i.src = ev.target.result;
                                                    }; r.readAsDataURL(f);
                                                }} />
                                            </label>
                                            <div className="grid grid-cols-3 gap-2">
                                                <div className="text-center space-y-1"><label className="text-[8px] uppercase text-slate-600 block">Nível</label><input type="number" value={formData.level} onChange={e=>setFormData({...formData, level: e.target.value})} className="input-hero text-center font-bold" /></div>
                                                <div className="text-center space-y-1"><label className="text-[8px] uppercase text-slate-600 block">Dono</label><input type="text" disabled={role!=='gm'} value={formData.ownerNickname} onChange={e=>setFormData({...formData, ownerNickname: e.target.value})} className="input-hero text-center text-[9px] text-orange-500 uppercase font-black" /></div>
                                            </div>
                                        </div>
                                        <div className="lg:col-span-8 space-y-10">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 text-white font-black text-center">
                                                <div className="bg-[#020617] border border-white/5 p-6 rounded-2xl shadow-inner">
                                                    <label className="text-[10px] uppercase text-red-500 block mb-4 italic opacity-60">Vida Máxima</label>
                                                    <input type="number" value={formData.hpMax} onChange={e=>setFormData({...formData, hpMax: e.target.value, hp: e.target.value})} className="bg-transparent text-4xl font-magic text-center w-full" />
                                                </div>
                                                <div className="bg-[#020617] border border-white/5 p-6 rounded-2xl shadow-inner">
                                                    <label className="text-[10px] uppercase text-sky-500 block mb-4 italic opacity-60">Magia Máxima</label>
                                                    <input type="number" value={formData.slotsMax} onChange={e=>setFormData({...formData, slotsMax: e.target.value, slots: e.target.value})} className="bg-transparent text-4xl font-magic text-center w-full" />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-6 gap-3 text-white font-black">{['str','dex','con','int','wis','cha'].map(a => (<div key={a} className="space-y-1"><label className="text-[9px] uppercase text-slate-500 text-center block italic leading-none">{a}</label><input type="number" value={formData[a]} onChange={e=>setFormData({...formData, [a]: e.target.value})} className="input-hero text-center font-black text-xl p-3" /></div>))}</div>
                                            <div className="space-y-2"><label className="text-[10px] uppercase text-slate-500 italic ml-2 block leading-none tracking-widest text-white">Saberes / Perícias</label><textarea value={formData.skills || ""} onChange={e=>setFormData({...formData, skills: e.target.value})} className="input-hero h-32 text-sm custom-scrollbar resize-none p-4" placeholder="Ex: Atletismo; Magia;" /></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 border-t border-white/10 bg-slate-900/90 flex justify-center">
                                    <button onClick={saveChar} disabled={isSaving} className="w-full max-w-xl bg-orange-600 p-5 rounded-2xl text-2xl font-magic font-black uppercase tracking-[0.5em] shadow-xl hover:bg-orange-500 transition-all flex justify-center items-center gap-6 active:scale-95 leading-none">
                                        {isSaving ? <Icons.Loader /> : <Icons.Shield size={28} />} Selar Escritura
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // AUX
        function StatusBar({ label, val, max, col, edit, onDelta }) {
            const bar = col === 'red' ? 'from-red-800 to-red-400' : 'from-sky-800 to-sky-400';
            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center px-1 font-magic uppercase italic leading-none text-white">
                        <span className={`text-${col}-500 text-[10px] font-black tracking-widest`}>{label}</span>
                        <div className="flex items-center gap-4">
                            {edit && <button onClick={()=>onDelta(-1)} className="text-slate-700 hover:text-white transition-all text-xl font-black outline-none leading-none">-</button>}
                            <span className="text-3xl font-black tabular-nums leading-none">{val} <span className="text-slate-700 text-base">/ {max}</span></span>
                            {edit && <button onClick={()=>onDelta(1)} className="text-slate-700 hover:text-white transition-all text-xl font-black outline-none leading-none">+</button>}
                        </div>
                    </div>
                    <div className="h-3 bg-slate-950 rounded-full border border-slate-800 overflow-hidden p-[2px] shadow-inner leading-none"><div className={`h-full bg-gradient-to-r ${bar} rounded-full transition-all duration-700 ease-out`} style={{width: `${Math.min(100, (val/max)*100)}%`}} /></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
