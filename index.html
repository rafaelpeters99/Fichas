<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire RPG - Salas Online</title>
    
    <!-- Bibliotecas Base via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .font-magic { font-family: 'Cinzel', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .room-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .room-card:hover {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.05);
            transform: translateY(-4px);
        }

        .editor-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
        }

        .editor-content {
            width: 100%;
            max-width: 1000px;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-input {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            padding: 0.5rem;
            text-align: center;
            color: white;
            width: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; color: #f97316; font-family: serif;">
            <div style="font-size: 1.5rem; margin-bottom: 1rem;">Invocando o Grimório...</div>
            <div style="font-size: 0.8rem; color: #475569;">A preparar conexão mística</div>
        </div>
    </div>

    <!-- Importações Firebase SDK via módulos -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Disponibilizar no escopo global para o Babel
        window.FB_SDK = { 
            initializeApp, 
            getAuth, 
            signInAnonymously, 
            signInWithCustomToken, 
            onAuthStateChanged, 
            getFirestore, 
            collection, 
            doc, 
            setDoc, 
            onSnapshot, 
            updateDoc, 
            deleteDoc, 
            query 
        };
    </script>

    <!-- Código da Aplicação usando Babel para processar JSX -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- COMPONENTES DE ÍCONE ---
        const Icons = {
            Shield: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Plus: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Logout: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Door: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>,
            X: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Loader: ({size=24}) => <svg className="animate-spin" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            Trash: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        };

        const MASTER_KEY = "MESTRE123";

        function App() {
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [appId, setAppId] = useState('default-rpg');
            const [sessionNickname, setSessionNickname] = useState(localStorage.getItem('rpg_nickname') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('rpg_nickname'));
            const [role, setRole] = useState(localStorage.getItem('rpg_role') || 'player');

            const [rooms, setRooms] = useState([]);
            const [currentRoom, setCurrentRoom] = useState(null);
            const [isCreatingRoom, setIsCreatingRoom] = useState(false);
            const [newRoomName, setNewRoomName] = useState("");

            const [characters, setCharacters] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [gmPass, setGmPass] = useState("");
            const [showGmLogin, setShowGmLogin] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");

            // --- INICIALIZAÇÃO FIREBASE (Regra 3 - Auth Primeiro) ---
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const config = JSON.parse(__firebase_config);
                        const app = window.FB_SDK.initializeApp(config);
                        const auth = window.FB_SDK.getAuth(app);
                        const firestore = window.FB_SDK.getFirestore(app);
                        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        
                        setDb(firestore);
                        setAppId(currentAppId);

                        // Autenticação Obrigatória antes de qualquer query
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.FB_SDK.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await window.FB_SDK.signInAnonymously(auth);
                        }

                        window.FB_SDK.onAuthStateChanged(auth, (u) => {
                            if (u) setUser(u);
                        });
                    } catch (e) {
                        console.error("Erro Crítico:", e);
                        setErrorMsg("Falha na conexão mística. Tente recarregar.");
                    }
                };
                initFirebase();
            }, []);

            // --- ESCUTAR SALAS (Regra 1 - Caminho Público) ---
            useEffect(() => {
                if (!user || !db) return;
                
                // artifacts/{appId}/public/data/rooms
                const roomsCol = window.FB_SDK.collection(db, 'artifacts', appId, 'public', 'data', 'rooms');
                
                const unsubscribe = window.FB_SDK.onSnapshot(roomsCol, (snapshot) => {
                    const roomList = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setRooms(roomList);
                }, (err) => {
                    console.error("Erro Salas (onSnapshot):", err);
                    setErrorMsg("Permissão insuficiente para ver salas.");
                });

                return () => unsubscribe();
            }, [user, db, appId]);

            // --- ESCUTAR PERSONAGENS ---
            useEffect(() => {
                if (!user || !db || !currentRoom) return;
                
                const charCol = window.FB_SDK.collection(db, 'artifacts', appId, 'public', 'data', 'characters');
                
                const unsubscribe = window.FB_SDK.onSnapshot(charCol, (snapshot) => {
                    const allChars = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    // Regra 2: Filtragem manual para evitar índices complexos
                    setCharacters(allChars.filter(c => c.roomId === currentRoom.id));
                }, (err) => {
                    console.error("Erro Chars (onSnapshot):", err);
                });

                return () => unsubscribe();
            }, [user, db, appId, currentRoom]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!sessionNickname.trim()) return;
                localStorage.setItem('rpg_nickname', sessionNickname.trim());
                localStorage.setItem('rpg_role', 'player');
                setIsLoggedIn(true);
            };

            const handleGmLogin = (e) => {
                e.preventDefault();
                if (gmPass === MASTER_KEY) {
                    localStorage.setItem('rpg_nickname', 'Mestre');
                    localStorage.setItem('rpg_role', 'gm');
                    setSessionNickname('Mestre');
                    setRole('gm');
                    setIsLoggedIn(true);
                } else {
                    setErrorMsg("Chave do Mestre inválida.");
                    setTimeout(() => setErrorMsg(""), 3000);
                }
            };

            const handleLogout = () => {
                localStorage.clear();
                window.location.reload();
            };

            const createRoom = async () => {
                if (!newRoomName.trim() || !db || !user) return;
                try {
                    const roomsCol = window.FB_SDK.collection(db, 'artifacts', appId, 'public', 'data', 'rooms');
                    const roomDoc = window.FB_SDK.doc(roomsCol);
                    await window.FB_SDK.setDoc(roomDoc, {
                        name: newRoomName.trim(),
                        master: sessionNickname,
                        createdAt: Date.now()
                    });
                    setNewRoomName("");
                    setIsCreatingRoom(false);
                } catch (e) {
                    console.error("Erro ao criar sala:", e);
                }
            };

            const saveChar = async () => {
                if (!formData.name?.trim() || !db || !user) return;
                setIsSaving(true);
                try {
                    const charCol = window.FB_SDK.collection(db, 'artifacts', appId, 'public', 'data', 'characters');
                    const charDoc = editingId === 'new' ? window.FB_SDK.doc(charCol) : window.FB_SDK.doc(db, 'artifacts', appId, 'public', 'data', 'characters', editingId);
                    
                    await window.FB_SDK.setDoc(charDoc, {
                        ...formData,
                        roomId: currentRoom.id,
                        updatedAt: Date.now(),
                        ownerNickname: formData.ownerNickname || sessionNickname
                    }, { merge: true });

                    setEditingId(null);
                    setFormData(null);
                } catch (e) {
                    console.error("Erro ao guardar:", e);
                } finally {
                    setIsSaving(false);
                }
            };

            const updateStat = async (id, field, delta, maxField) => {
                const char = characters.find(c => c.id === id);
                if (!char || !db || !user) return;
                
                let val = (Number(char[field]) || 0) + delta;
                if (maxField) val = Math.min(val, Number(char[maxField]) || 999);
                
                const charDoc = window.FB_SDK.doc(db, 'artifacts', appId, 'public', 'data', 'characters', id);
                await window.FB_SDK.updateDoc(charDoc, { [field]: Math.max(0, val) });
            };

            // --- TELAS ---
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617]">
                        <div className="glass-panel p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl animate-in">
                            <div className="text-orange-500 mb-6 flex justify-center"><Icons.Shield size={48} /></div>
                            <h1 className="text-4xl font-magic font-black uppercase mb-10 text-white">Grimoire</h1>
                            {errorMsg && <p className="text-red-500 text-xs mb-4 font-bold">{errorMsg}</p>}
                            {!showGmLogin ? (
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <input type="text" value={sessionNickname} onChange={e => setSessionNickname(e.target.value)} placeholder="Teu Nickname" className="stat-input py-4 text-white" />
                                    <button className="w-full bg-orange-600 p-4 rounded-xl font-black uppercase text-sm hover:bg-orange-500 transition-colors shadow-lg shadow-orange-900/20">Entrar</button>
                                    <button type="button" onClick={() => setShowGmLogin(true)} className="text-slate-500 text-xs font-bold uppercase mt-4 hover:text-slate-300">Sou Mestre</button>
                                </form>
                            ) : (
                                <form onSubmit={handleGmLogin} className="space-y-6">
                                    <input type="password" value={gmPass} onChange={e => setGmPass(e.target.value)} placeholder="Chave do Mestre" className="stat-input py-4 text-white" />
                                    <button className="w-full bg-white text-slate-950 p-4 rounded-xl font-black uppercase text-sm hover:bg-slate-200 transition-colors">Validar</button>
                                    <button type="button" onClick={() => setShowGmLogin(false)} className="text-slate-500 text-xs font-bold uppercase mt-4 hover:text-slate-300">Voltar</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            if (!currentRoom) {
                return (
                    <div className="max-w-[800px] mx-auto p-8 md:p-20 min-h-screen">
                        <header className="flex justify-between items-center mb-16">
                            <div>
                                <h1 className="text-4xl font-magic font-black uppercase text-white">Salas</h1>
                                <p className="text-xs text-slate-500 uppercase tracking-widest mt-2">Escolha uma crônica • {sessionNickname}</p>
                            </div>
                            <button onClick={handleLogout} className="p-3 glass-panel rounded-xl text-slate-500 hover:text-red-500 transition-colors"><Icons.Logout /></button>
                        </header>
                        <div className="grid grid-cols-1 gap-6">
                            {role === 'gm' && (
                                <button onClick={() => setIsCreatingRoom(true)} className="glass-panel p-8 rounded-3xl border-dashed border-2 border-slate-800 hover:border-orange-500/40 transition-all flex flex-col items-center gap-4 group">
                                    <div className="bg-orange-600/10 p-4 rounded-full text-orange-500 group-hover:scale-110 transition-transform"><Icons.Plus size={32}/></div>
                                    <span className="font-magic font-black uppercase text-sm tracking-widest text-orange-500">Forjar Nova Sala</span>
                                </button>
                            )}
                            {rooms.length === 0 ? (
                                <div className="py-20 text-center opacity-20 font-magic uppercase italic tracking-widest">Aguardando início de jornada...</div>
                            ) : rooms.map(room => (
                                <div key={room.id} onClick={() => setCurrentRoom(room)} className="glass-panel p-8 rounded-3xl room-card flex justify-between items-center group">
                                    <div className="flex items-center gap-6">
                                        <div className="text-orange-500/40 group-hover:text-orange-500"><Icons.Shield size={32}/></div>
                                        <div>
                                            <h3 className="text-2xl font-magic font-black uppercase text-white leading-none">{room.name}</h3>
                                            <p className="text-[10px] text-slate-500 uppercase font-black mt-2">Mestre: {room.master}</p>
                                        </div>
                                    </div>
                                    <div className="text-slate-700 group-hover:text-white transition-colors"><Icons.Door size={24}/></div>
                                </div>
                            ))}
                        </div>
                        {isCreatingRoom && (
                            <div className="editor-overlay">
                                <div className="glass-panel p-10 rounded-3xl w-full max-w-sm text-center border border-orange-500/30">
                                    <h2 className="text-xl font-magic font-black uppercase text-orange-500 mb-8 tracking-widest">Nova Sessão</h2>
                                    <input autoFocus type="text" value={newRoomName} onChange={e => setNewRoomName(e.target.value)} placeholder="Nome da Mesa..." className="stat-input py-4 mb-6" />
                                    <div className="flex gap-4">
                                        <button onClick={() => setIsCreatingRoom(false)} className="flex-1 bg-slate-900 p-4 rounded-xl font-black uppercase text-xs">Cancelar</button>
                                        <button onClick={createRoom} className="flex-1 bg-orange-600 p-4 rounded-xl font-black uppercase text-xs">Criar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="max-w-[1600px] mx-auto p-4 md:p-12 min-h-screen">
                    <header className="flex justify-between items-center mb-16">
                        <div className="flex items-center gap-6">
                            <div className="text-orange-500 p-3 glass-panel rounded-xl"><Icons.Shield size={32} /></div>
                            <div>
                                <h1 className="text-4xl md:text-5xl font-magic font-black uppercase text-white leading-none tracking-tight">{currentRoom.name}</h1>
                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mt-2 italic">{sessionNickname} • Online</p>
                            </div>
                        </div>
                        <button onClick={() => setCurrentRoom(null)} className="p-4 glass-panel rounded-xl text-slate-500 hover:text-orange-500 transition-colors flex items-center gap-3">
                            <Icons.Door size={20}/> <span className="hidden md:block text-[10px] font-black uppercase tracking-tighter">Mudar Sala</span>
                        </button>
                    </header>

                    <div className="flex justify-between items-center mb-10">
                        <span className="text-[10px] uppercase tracking-widest text-slate-500 border-l border-orange-500 pl-4">{characters.length} Heróis Conectados</span>
                        <button onClick={() => { setFormData({ name: "", hp: 10, hpMax: 10, slots: 2, slotsMax: 2, speed: 9, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 1, ownerNickname: role === 'gm' ? "" : sessionNickname, isHidden: false }); setEditingId('new'); }} className="bg-orange-600 p-5 rounded-full shadow-xl hover:scale-110 active:scale-95 transition-all"><Icons.Plus size={24}/></button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 pb-20">
                        {characters.length === 0 ? (
                            <div className="col-span-full py-20 text-center opacity-20 font-magic uppercase italic tracking-widest">Aguardando registros nesta mesa...</div>
                        ) : characters.map(char => {
                            const isOwner = char.ownerNickname?.toLowerCase() === sessionNickname.toLowerCase();
                            const hasAccess = isOwner || role === 'gm';
                            return (
                                <div key={char.id} className={`glass-panel rounded-[3rem] overflow-hidden border-2 ${isOwner ? 'border-orange-500/30 shadow-orange-900/10' : 'border-transparent'} flex flex-col shadow-2xl transition-all`}>
                                    <div className="p-8">
                                        <div className="flex justify-between items-start mb-10 gap-4">
                                            <div className="flex-1">
                                                <h3 className="text-3xl font-magic font-black uppercase italic leading-none text-white mb-2">{char.name}</h3>
                                                <p className="text-[10px] text-slate-500 font-black uppercase italic tracking-widest">{char.ownerNickname} • Nível {char.level}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                {hasAccess && <button onClick={() => { setEditingId(char.id); setFormData(char); }} className="p-3 glass-panel rounded-xl text-orange-500 hover:bg-orange-500/10 transition-colors shadow-inner"><Icons.Plus size={18}/></button>}
                                                {role === 'gm' && <button onClick={() => window.FB_SDK.deleteDoc(window.FB_SDK.doc(db, 'artifacts', appId, 'public', 'data', 'characters', char.id))} className="p-3 glass-panel rounded-xl text-red-500 hover:bg-red-500/10 transition-colors"><Icons.Trash size={18}/></button>}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <StatusBar label="Vida" val={char.hp} max={char.hpMax} col="red" edit={hasAccess} onDelta={d => updateStat(char.id, 'hp', d, 'hpMax')} />
                                            <StatusBar label="Magia" val={char.slots} max={char.slotsMax} col="sky" edit={hasAccess} onDelta={d => updateStat(char.id, 'slots', d, 'slotsMax')} />
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {editingId && formData && (
                        <div className="editor-overlay">
                            <div className="editor-content glass-panel animate-in">
                                <div className="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/80">
                                    <div className="flex items-center gap-3 text-orange-500 font-magic italic leading-none"><Icons.Shield size={24}/><h2 className="text-xl uppercase tracking-tighter leading-none">Mudar o Destino</h2></div>
                                    <button onClick={() => setEditingId(null)} className="p-2 text-slate-400 hover:text-white transition-colors"><Icons.X size={24}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 custom-scrollbar bg-[#020617]/50">
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-10 text-white font-black">
                                        <div className="md:col-span-4 space-y-6 text-center">
                                            <div className="space-y-1.5 text-left"><label className="text-[10px] uppercase text-slate-500 ml-1">Nome</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="stat-input text-lg font-magic uppercase text-orange-500" /></div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1.5"><label className="text-[8px] uppercase text-slate-500">Nível</label><input type="number" value={formData.level} onChange={e => setFormData({...formData, level: Number(e.target.value)})} className="stat-input" /></div>
                                                <div className="space-y-1.5"><label className="text-[8px] uppercase text-slate-500">Dono</label><input type="text" disabled={role !== 'gm'} value={formData.ownerNickname} onChange={e => setFormData({...formData, ownerNickname: e.target.value})} className="stat-input text-[10px] text-orange-500 uppercase" /></div>
                                            </div>
                                        </div>
                                        <div className="md:col-span-8 space-y-10">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 text-center">
                                                <div className="glass-panel p-6 rounded-2xl group transition-colors hover:border-red-500/20"><label className="text-[10px] uppercase text-red-500 block mb-4 italic opacity-60 font-black tracking-widest">Vitalidade Máx</label><input type="number" value={formData.hpMax} onChange={e => setFormData({...formData, hpMax: Number(e.target.value), hp: Number(e.target.value)})} className="bg-transparent text-5xl font-magic text-red-500 text-center w-full outline-none" /></div>
                                                <div className="glass-panel p-6 rounded-2xl group transition-colors hover:border-sky-500/20"><label className="text-[10px] uppercase text-sky-500 block mb-4 italic opacity-60 font-black tracking-widest">Arcanismo Máx</label><input type="number" value={formData.slotsMax} onChange={e => setFormData({...formData, slotsMax: Number(e.target.value), slots: Number(e.target.value)})} className="bg-transparent text-5xl font-magic text-sky-400 text-center w-full outline-none" /></div>
                                            </div>
                                            <div className="grid grid-cols-6 gap-3">
                                                {['str','dex','con','int','wis','cha'].map(a => (<div key={a} className="space-y-2"><label className="text-[9px] uppercase text-slate-500 text-center block italic leading-none">{a}</label><input type="number" value={formData[a]} onChange={e => setFormData({...formData, [a]: Number(e.target.value)})} className="stat-input py-3 font-magic text-xl" /></div>))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8 border-t border-white/10 bg-slate-900/90 flex justify-center">
                                    <button onClick={saveChar} disabled={isSaving} className="w-full max-w-xl bg-orange-600 p-5 rounded-2xl text-2xl font-magic font-black uppercase tracking-[0.4em] shadow-xl hover:bg-orange-500 transition-all flex justify-center items-center gap-6 active:scale-95 disabled:opacity-50">
                                        {isSaving ? <Icons.Loader size={32} /> : <Icons.Shield size={32} />} {isSaving ? "A Selar..." : "Selar Escritura"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function StatusBar({ label, val, max, col, edit, onDelta }) {
            const barColor = col === 'red' ? 'from-red-800 to-red-400' : 'from-sky-800 to-sky-400';
            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-end text-white">
                        <span className={`text-${col}-500 text-[10px] font-black uppercase tracking-[0.2em] mb-1 italic`}>{label}</span>
                        <div className="flex items-center gap-4">
                            {edit && <button onClick={()=>onDelta(-1)} className="text-slate-600 hover:text-white transition-colors text-2xl font-light">-</button>}
                            <span className="text-3xl font-magic font-black tabular-nums tracking-tighter">{val} <span className="text-slate-700 text-sm italic">/ {max}</span></span>
                            {edit && <button onClick={()=>onDelta(1)} className="text-slate-600 hover:text-white transition-colors text-2xl font-light">+</button>}
                        </div>
                    </div>
                    <div className="h-2.5 bg-slate-950 rounded-full border border-white/5 overflow-hidden p-[1px] shadow-inner"><div className={`h-full bg-gradient-to-r ${barColor} transition-all duration-700 rounded-full`} style={{width: `${Math.min(100, (val/max)*100)}%`}} /></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
