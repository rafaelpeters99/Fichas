<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire RPG - Conexão Direta</title>
    
    <!-- Bibliotecas Base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PeerJS para Sincronização P2P Realtime -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
        }

        .font-magic { font-family: 'Cinzel', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.96); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .animate-in { 
            animation: fadeIn 0.3s ease-out forwards; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.98) translateY(10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        .input-hero { 
            background: #020617 !important; 
            border: 1px solid #1e293b !important; 
            border-radius: 0.5rem; 
            padding: 0.5rem 0.75rem; 
            color: white !important; 
            width: 100%; 
            outline: none; 
            font-size: 0.85rem; 
            transition: all 0.2s ease;
        }

        .input-hero:focus { border-color: #f97316 !important; }

        .break-words {
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
        }

        .photo-container {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const MASTER_KEY = "MESTRE123";

        // Componente de Ícone SVG Nativo
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                plus: <g><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></g>,
                "log-out": <g><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></g>,
                "edit-3": <g><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></g>,
                "trash-2": <g><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></g>,
                "scroll-text": <g><path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M15 8h-5"/><path d="M15 12h-5"/></g>,
                package: <g><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></g>,
                sword: <g><polyline points="14.5 17.5 3 6 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></g>,
                gem: <g><path d="M6 3h12l4 6-10 12L2 9z"/><path d="M11 3 8 9l3 12"/><path d="M13 3l3 6-3 12"/><path d="m2 9 20 0"/></g>,
                "door-open": <g><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M18 12h-4.5"/><path d="M2 3h10v18H2V3z"/><path d="M7 12v.01"/></g>,
                x: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>,
                "loader-2": <path d="M21 12a9 9 0 1 1-6.219-8.56"/>,
                user: <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>,
                eye: <g><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></g>,
                "eye-off": <g><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // Função de cálculo de modificador (Bónus)
        const getMod = (val) => {
            const v = Number(val) || 10;
            const mod = Math.floor((v - 10) / 2);
            return mod >= 0 ? `+${mod}` : mod.toString();
        };

        function App() {
            const [nickname, setNickname] = useState(localStorage.getItem('rpg_nickname') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('rpg_nickname'));
            const [role, setRole] = useState(localStorage.getItem('rpg_role') || 'player');
            const [gmPass, setGmPass] = useState("");
            const [showGmLogin, setShowGmLogin] = useState(false);

            const [roomName, setRoomName] = useState("");
            const [inRoom, setInRoom] = useState(false);
            const [peer, setPeer] = useState(null);
            const [connections, setConnections] = useState([]); 
            const [connToMaster, setConnToMaster] = useState(null); 

            const [characters, setCharacters] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState(null);
            const [expandedCards, setExpandedCards] = useState({});
            const [storyCharId, setStoryCharId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            const startRoomAsMaster = () => {
                if (!roomName.trim()) return;
                const p = new Peer(`grimoire-${roomName.trim().toLowerCase()}`);
                p.on('open', () => { setPeer(p); setInRoom(true); });
                p.on('connection', (conn) => {
                    conn.on('open', () => {
                        setConnections(prev => [...prev, conn]);
                        conn.send({ type: 'SYNC_ALL', data: characters });
                    });
                    conn.on('data', (payload) => {
                        if (payload.type === 'UPDATE_CHAR') setCharacters(payload.data);
                    });
                });
                p.on('error', (err) => {
                    if (err.type === 'unavailable-id') alert("Sala em uso.");
                    else console.error(err);
                });
            };

            const joinRoomAsPlayer = () => {
                if (!roomName.trim()) return;
                const p = new Peer();
                p.on('open', () => {
                    const conn = p.connect(`grimoire-${roomName.trim().toLowerCase()}`);
                    conn.on('open', () => { setConnToMaster(conn); setPeer(p); setInRoom(true); });
                    conn.on('data', (payload) => {
                        if (payload.type === 'SYNC_ALL') setCharacters(payload.data);
                    });
                });
            };

            const broadcastData = (newData) => {
                if (role === 'gm') connections.forEach(c => c.send({ type: 'SYNC_ALL', data: newData }));
                else if (connToMaster) connToMaster.send({ type: 'UPDATE_CHAR', data: newData });
            };

            const toggleVisibility = (id) => {
                const newList = characters.map(c => c.id === id ? { ...c, isHidden: !c.isHidden } : c);
                setCharacters(newList);
                broadcastData(newList);
            };

            const saveChar = () => {
                if (!formData.name?.trim()) return alert("Nome obrigatório!");
                setIsSaving(true);
                const id = editingId === 'new' ? Math.random().toString(36).substr(2, 9) : editingId;
                const data = { ...formData, id, updatedAt: Date.now(), ownerNickname: formData.ownerNickname || nickname };
                const newList = editingId === 'new' ? [data, ...characters] : characters.map(c => c.id === editingId ? data : c);
                setCharacters(newList);
                broadcastData(newList);
                setIsSaving(false); setEditingId(null); setFormData(null);
            };

            const updateStat = (id, field, delta, maxField) => {
                const newList = characters.map(c => {
                    if (c.id !== id) return c;
                    let val = (Number(c[field]) || 0) + delta;
                    if (maxField) val = Math.min(val, Number(c[maxField]) || 999);
                    return { ...c, [field]: Math.max(0, val) };
                });
                setCharacters(newList);
                broadcastData(newList);
            };

            const deleteChar = (id) => {
                if (!confirm("Apagar?")) return;
                const newList = characters.filter(c => c.id !== id);
                setCharacters(newList);
                broadcastData(newList);
            };

            const visibleCharacters = useMemo(() => {
                if (role === 'gm') return characters;
                return characters.filter(c => {
                    const isOwner = c.ownerNickname?.toLowerCase().trim() === nickname.toLowerCase().trim();
                    return !c.isHidden || isOwner;
                });
            }, [characters, role, nickname]);

            const selectedStoryChar = useMemo(() => characters.find(c => c.id === storyCharId), [characters, storyCharId]);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-in text-white">
                        <div className="glass-panel p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
                            <Icon name="shield" size={48} className="text-orange-500 mb-6 mx-auto" />
                            <h1 className="text-4xl font-magic font-black uppercase mb-10 leading-none text-white">Grimoire</h1>
                            {!showGmLogin ? (
                                <form onSubmit={(e) => { e.preventDefault(); if(nickname.trim()){ localStorage.setItem('rpg_nickname', nickname.trim()); setIsLoggedIn(true); } }} className="space-y-6">
                                    <input type="text" value={nickname} onChange={e => setNickname(e.target.value)} placeholder="Teu Nickname" className="input-hero py-4 text-center font-bold" />
                                    <button className="w-full bg-orange-600 p-4 rounded-xl font-black uppercase text-sm shadow-lg hover:bg-orange-500 transition-all">Entrar</button>
                                    <button type="button" onClick={() => setShowGmLogin(true)} className="text-slate-500 text-xs font-bold uppercase mt-4">Painel Mestre</button>
                                </form>
                            ) : (
                                <form onSubmit={(e) => { e.preventDefault(); if(gmPass === MASTER_KEY){ localStorage.setItem('rpg_nickname', 'Mestre'); localStorage.setItem('rpg_role', 'gm'); setNickname('Mestre'); setRole('gm'); setIsLoggedIn(true); } else alert("Erro!"); }} className="space-y-6">
                                    <input type="password" value={gmPass} onChange={e => setGmPass(e.target.value)} placeholder="Chave Secreta" className="input-hero py-4 text-center font-bold" />
                                    <button className="w-full bg-white text-slate-950 p-4 rounded-xl font-black uppercase text-sm">Validar</button>
                                    <button type="button" onClick={() => setShowGmLogin(false)} className="text-slate-500 text-xs font-bold uppercase mt-4">Voltar</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            if (!inRoom) {
                return (
                    <div className="max-w-[500px] mx-auto p-10 min-h-screen flex flex-col justify-center animate-in text-white">
                        <h1 className="text-4xl font-magic font-black uppercase text-white mb-10 text-center tracking-widest">Salas</h1>
                        <div className="glass-panel p-8 rounded-3xl space-y-6">
                            <input type="text" value={roomName} onChange={e => setRoomName(e.target.value)} placeholder="Identificador da Mesa" className="input-hero py-4 text-center text-lg font-bold uppercase" />
                            {role === 'gm' ? (
                                <button onClick={startRoomAsMaster} className="w-full bg-orange-600 p-4 rounded-xl font-black uppercase text-xs">Forjar Sala</button>
                            ) : (
                                <button onClick={joinRoomAsPlayer} className="w-full bg-emerald-600 p-4 rounded-xl font-black uppercase text-xs">Entrar na Sala</button>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-[1600px] mx-auto p-4 md:p-12 animate-in min-h-screen">
                    <header className="flex justify-between items-center mb-16">
                        <div className="flex items-center gap-6 leading-none">
                            <Icon name="shield" size={32} className="text-orange-500" />
                            <div><h1 className="text-3xl font-magic font-black uppercase leading-none text-white">{roomName}</h1><p className="text-[10px] uppercase text-slate-500 mt-1 italic tracking-widest leading-none">{nickname}</p></div>
                        </div>
                        <button onClick={() => window.location.reload()} className="p-4 glass-panel rounded-xl text-slate-500 hover:text-red-500 transition-all font-black text-[10px] uppercase">Sair da Sala</button>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 pb-20">
                        {visibleCharacters.map(char => {
                            const isOwner = char.ownerNickname?.toLowerCase().trim() === nickname.toLowerCase().trim();
                            const hasAccess = isOwner || role === 'gm';
                            const isExpanded = expandedCards[char.id];
                            return (
                                <div key={char.id} className={`glass-panel rounded-[3rem] border-2 ${char.isHidden ? 'opacity-50 border-purple-500/20' : isOwner ? 'border-orange-500/30' : 'border-transparent'} flex flex-col shadow-2xl transition-all relative z-10 hover:z-30`}>
                                    
                                    <div className="photo-container relative h-64 hover:h-auto hover:aspect-square bg-slate-950 overflow-hidden rounded-t-[3rem] border-b border-white/5 group/photo">
                                        {char.imageUrl ? <img src={char.imageUrl} className="w-full h-full object-cover" /> : <div className="h-full flex items-center justify-center opacity-10"><Icon name="user" size={64} className="text-white"/></div>}
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950/80 to-transparent group-hover/photo:opacity-0 transition-opacity"></div>
                                        
                                        <div className="absolute top-4 left-4 flex gap-2 pointer-events-none">
                                            {isOwner && <div className="bg-orange-500 text-slate-950 font-black px-3 py-1 rounded-full text-[8px] uppercase tracking-widest shadow-lg">MEU HERÓI</div>}
                                            {char.isHidden && <div className="bg-purple-600 text-white font-black px-3 py-1 rounded-full text-[8px] uppercase tracking-widest shadow-lg">OCULTO</div>}
                                        </div>

                                        {hasAccess && (
                                            <button onClick={() => setStoryCharId(char.id)} className="absolute bottom-4 right-6 text-white/40 font-magic uppercase text-[8px] tracking-widest opacity-0 hover:text-white group-hover/photo:opacity-100 bg-black/40 px-3 py-1.5 rounded-full backdrop-blur-sm italic">
                                                Ler Crónica <Icon name="scroll-text" size={14} className="inline ml-1" />
                                            </button>
                                        )}
                                    </div>

                                    <div className="p-8">
                                        <div className="flex justify-between items-start mb-10 gap-4 leading-none">
                                            <div className="flex-1 min-w-0">
                                                <h3 className="text-3xl font-magic font-black uppercase italic leading-none text-white mb-2 truncate break-words">{char.name}</h3>
                                                <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest leading-none italic">{char.ownerNickname} • Nível {char.level}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                {role === 'gm' && (
                                                    <button onClick={() => toggleVisibility(char.id)} title={char.isHidden ? "Mostrar para todos" : "Ocultar dos outros"} className={`p-3 rounded-xl border transition-all ${char.isHidden ? 'bg-purple-900/40 border-purple-500/30 text-purple-400' : 'glass-panel text-slate-400 hover:text-white'}`}>
                                                        <Icon name={char.isHidden ? "eye-off" : "eye"} size={18} />
                                                    </button>
                                                )}
                                                {hasAccess && <button onClick={() => { setEditingId(char.id); setFormData(char); }} className="p-3 glass-panel rounded-xl text-orange-500 hover:bg-orange-500/10 transition-colors shadow-inner"><Icon name="edit-3" size={18}/></button>}
                                                {role === 'gm' && <button onClick={() => deleteChar(char.id)} className="p-3 glass-panel rounded-xl text-red-500 hover:bg-red-500/10 transition-colors"><Icon name="trash-2" size={18}/></button>}
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                            <StatusBar label="Vida" val={char.hp} max={char.hpMax} col="red" edit={hasAccess} onDelta={d => updateStat(char.id, 'hp', d, 'hpMax')} />
                                            <StatusBar label="Magia" val={char.slots} max={char.slotsMax} col="sky" edit={hasAccess} onDelta={d => updateStat(char.id, 'slots', d, 'slotsMax')} />
                                        </div>
                                        
                                        {hasAccess && (
                                            <div className="space-y-6">
                                                {/* GRID ATRIBUTOS COM BÓNUS */}
                                                <div className="grid grid-cols-3 sm:grid-cols-6 gap-2">
                                                    {['str','dex','con','int','wis','cha'].map(a => (
                                                        <div key={a} className="glass-panel py-3 rounded-2xl text-center group hover:border-orange-500/30 transition-all leading-none border-white/5">
                                                            <div className="text-[8px] text-slate-600 uppercase mb-1 font-black group-hover:text-orange-500 leading-none italic">{a}</div>
                                                            <div className="text-xl font-magic font-black text-white leading-none mb-1">{char[a] || 10}</div>
                                                            <div className="text-[10px] font-black text-orange-500/60 font-serif leading-none italic">{getMod(char[a])}</div>
                                                        </div>
                                                    ))}
                                                </div>

                                                <button onClick={() => setExpandedCards(p => ({...p, [char.id]: !p[char.id]}))} className={`w-full p-4 rounded-2xl font-magic font-black uppercase text-[9px] tracking-[0.3em] transition-all flex justify-between items-center ${isExpanded ? 'bg-orange-600 text-white shadow-xl shadow-orange-900/20' : 'glass-panel text-slate-500'}`}>
                                                    <span>Inventário & Saberes</span> <span>{isExpanded ? '▲' : '▼'}</span>
                                                </button>
                                                
                                                {isExpanded && (
                                                    <div className="grid grid-cols-1 gap-6 animate-in">
                                                        <div className="glass-panel p-6 rounded-2xl bg-slate-900/40 text-left">
                                                            <h4 className="text-[9px] font-black text-orange-500 uppercase mb-4 tracking-widest italic font-magic leading-none">Equipamento Ativo</h4>
                                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                                                <EquipItem icon="sword" label="Arma" value={char.weapon} />
                                                                <EquipItem icon="shield" label="Armadura" value={char.armor} />
                                                                <EquipItem icon="gem" label="Acessório" value={char.accessory} />
                                                            </div>
                                                        </div>
                                                        <div className="space-y-4"><ListBlock title="Perícias" content={char.skills} /> <ListBlock title="Habilidades" content={char.abilities} /></div>
                                                        <div className="glass-panel p-6 rounded-2xl border-white/5 text-left bg-slate-950/20">
                                                            <h4 className="text-[9px] font-black text-orange-500 uppercase mb-3 italic leading-none font-magic text-white"><Icon name="package" size={14} className="inline mr-1" /> Mochila</h4>
                                                            <p className="text-xs text-slate-400 italic break-words leading-relaxed">{char.inventory || "Vazio."}</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                        <button onClick={() => { setFormData({ name: "", hp: 10, hpMax: 10, slots: 2, slotsMax: 2, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 1, ownerNickname: role === 'gm' ? "" : nickname, isHidden: false, history: "", skills: "", abilities: "", inventory: "", weapon: "", armor: "", accessory: "", imageUrl: "" }); setEditingId('new'); }} className="glass-panel border-dashed border-2 border-slate-800 rounded-[3rem] p-20 flex flex-col items-center justify-center gap-4 text-slate-700 hover:text-orange-500 hover:border-orange-500/40 transition-all group min-h-[300px]">
                            <Icon name="plus" size={48} />
                            <span className="font-magic uppercase font-black text-xs tracking-widest italic leading-none">Invocar Viajante</span>
                        </button>
                    </div>

                    {/* MODAL HISTÓRIA */}
                    {selectedStoryChar && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[2000] flex items-center justify-center p-4 text-white" onClick={()=>setStoryCharId(null)}>
                            <div className="bg-slate-900 border border-white/10 w-full max-w-2xl rounded-3xl p-8 lg:p-12 relative shadow-2xl animate-in" onClick={e=>e.stopPropagation()}>
                                <button onClick={() => setStoryCharId(null)} className="absolute top-6 right-6 text-slate-500 hover:text-white"><Icon name="x" size={24}/></button>
                                <h2 className="text-3xl font-black font-magic text-white uppercase mb-8 border-b border-white/5 pb-6 leading-none">Crónica: {selectedStoryChar.name}</h2>
                                <div className="text-slate-300 italic font-serif leading-loose text-lg whitespace-pre-wrap max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar break-words leading-relaxed">{selectedStoryChar.history || "História nula."}</div>
                            </div>
                        </div>
                    )}

                    {/* EDITOR */}
                    {editingId && formData && (
                        <div className="editor-overlay">
                            <div className="editor-content glass-panel animate-in text-white border-white/5">
                                <div className="p-5 border-b border-white/10 flex justify-between items-center bg-slate-950/80 shadow-xl leading-none">
                                    <div className="flex items-center gap-3 text-orange-500 font-magic italic leading-none"><Icon name="shield" size={24}/><h2 className="text-xl uppercase tracking-tighter">Forjar Destino</h2></div>
                                    <button onClick={() => setEditingId(null)} className="p-2 text-slate-400 hover:text-white transition-colors"><Icon name="x" size={24}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 custom-scrollbar bg-[#020617]/50 text-white">
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-10">
                                        <div className="md:col-span-4 space-y-6 text-left">
                                            <div className="space-y-1.5"><label className="text-[10px] uppercase text-slate-500 font-bold ml-1 italic leading-none">Identidade</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="input-hero text-lg font-magic uppercase text-orange-500" /></div>
                                            <label className="flex flex-col items-center justify-center h-48 bg-slate-950 border-2 border-dashed border-slate-800 rounded-xl cursor-pointer overflow-hidden relative">
                                                {formData.imageUrl ? <img src={formData.imageUrl} className="w-full h-full object-cover" /> : <div className="text-slate-800 opacity-30"><Icon name="user" size={40}/></div>}
                                                <input type="file" accept="image/*" className="hidden" onChange={(e) => {
                                                    const file = e.target.files[0]; if (!file) return;
                                                    const reader = new FileReader();
                                                    reader.onload = (ev) => {
                                                        const img = new Image(); img.onload = () => {
                                                            const canvas = document.createElement('canvas'); canvas.width = 500; canvas.height = 500; 
                                                            const ctx = canvas.getContext('2d'); const min = Math.min(img.width, img.height);
                                                            ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, 500, 500);
                                                            setFormData(prev => ({ ...prev, imageUrl: canvas.toDataURL('image/jpeg', 0.5) }));
                                                        }; img.src = ev.target.result;
                                                    }; reader.readAsDataURL(file);
                                                }}/>
                                            </label>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1.5 text-left leading-none"><label className="text-[8px] uppercase text-slate-600 font-bold leading-none">Nível</label><input type="number" value={formData.level} onChange={e => setFormData({...formData, level: Number(e.target.value)})} className="input-hero font-bold" /></div>
                                                <div className="space-y-1.5 text-left leading-none"><label className="text-[8px] uppercase text-slate-600 font-bold leading-none">Dono</label><input type="text" disabled={role !== 'gm'} value={formData.ownerNickname} onChange={e => setFormData({...formData, ownerNickname: e.target.value})} className="input-hero text-[10px] text-orange-500 uppercase font-black" /></div>
                                            </div>
                                            <div className="space-y-4 pt-4 border-t border-white/5">
                                                <h3 className="text-[10px] uppercase text-orange-500 font-bold font-magic italic leading-none">Equipamento</h3>
                                                <div className="space-y-3">
                                                    <input type="text" value={formData.weapon} onChange={e => setFormData({...formData, weapon: e.target.value})} className="input-hero text-xs" placeholder="Arma" />
                                                    <input type="text" value={formData.armor} onChange={e => setFormData({...formData, armor: e.target.value})} className="input-hero text-xs" placeholder="Armadura" />
                                                    <input type="text" value={formData.accessory} onChange={e => setFormData({...formData, accessory: e.target.value})} className="input-hero text-xs" placeholder="Acessório" />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="md:col-span-8 space-y-10 text-center">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 leading-none">
                                                <div className="glass-panel p-6 rounded-2xl text-center"><label className="text-[10px] uppercase text-red-500 block mb-4 italic font-black font-magic leading-none">Vitalidade Máx</label><input type="number" value={formData.hpMax} onChange={e => setFormData({...formData, hpMax: Number(e.target.value), hp: Number(e.target.value)})} className="bg-transparent text-5xl font-magic text-red-500 text-center w-full outline-none leading-none font-black" /></div>
                                                <div className="glass-panel p-6 rounded-2xl text-center"><label className="text-[10px] uppercase text-sky-500 block mb-4 italic font-black font-magic leading-none">Arcanismo Máx</label><input type="number" value={formData.slotsMax} onChange={e => setFormData({...formData, slotsMax: Number(e.target.value), slots: Number(e.target.value)})} className="bg-transparent text-5xl font-magic text-sky-400 text-center w-full outline-none leading-none font-black" /></div>
                                            </div>
                                            {/* GRID EDIT ATRIBUTOS COM BÓNUS DINÂMICO */}
                                            <div className="grid grid-cols-6 gap-3 leading-none">
                                                {['str','dex','con','int','wis','cha'].map(a => (
                                                    <div key={a} className="space-y-2">
                                                        <label className="text-[9px] uppercase text-slate-500 font-bold block leading-none">{a}</label>
                                                        <input type="number" value={formData[a]} onChange={e => setFormData({...formData, [a]: Number(e.target.value)})} className="input-hero py-3 font-magic text-xl text-center font-black" />
                                                        <div className="text-[10px] font-black text-orange-500 font-serif leading-none italic">{getMod(formData[a])}</div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="space-y-3 text-left leading-none">
                                                <label className="text-[10px] uppercase text-slate-500 italic ml-2 font-bold font-magic leading-none">Crónica do Herói</label>
                                                <textarea value={formData.history} onChange={e => setFormData({...formData, history: e.target.value})} className="input-hero h-32 text-left text-sm font-serif italic resize-none p-4 break-words custom-scrollbar leading-relaxed" />
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 leading-none text-left">
                                                <div className="space-y-1.5 leading-none"><label className="text-[9px] uppercase text-slate-500 font-bold ml-1 leading-none">Perícias</label><textarea value={formData.skills} onChange={e => setFormData({...formData, skills: e.target.value})} className="input-hero h-32 text-left text-xs italic resize-none p-4 break-words custom-scrollbar" placeholder="Nome: Desc;" /></div>
                                                <div className="space-y-1.5 leading-none"><label className="text-[9px] uppercase text-slate-500 font-bold ml-1 leading-none">Habilidades</label><textarea value={formData.abilities} onChange={e => setFormData({...formData, abilities: e.target.value})} className="input-hero h-32 text-left text-xs italic resize-none p-4 break-words custom-scrollbar" placeholder="Nome: Desc;" /></div>
                                            </div>
                                            <textarea value={formData.inventory} onChange={e => setFormData({...formData, inventory: e.target.value})} className="input-hero h-24 text-left text-xs italic resize-none break-words custom-scrollbar" placeholder="Mochila..." />
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8 border-t border-white/10 bg-slate-900/90 flex justify-center shadow-inner leading-none">
                                    <button onClick={saveChar} disabled={isSaving} className="w-full max-w-xl bg-orange-600 p-5 rounded-2xl text-2xl font-magic font-black uppercase tracking-[0.4em] shadow-xl hover:bg-orange-500 transition-all flex justify-center items-center gap-6 leading-none active:scale-95 disabled:opacity-50">
                                        {isSaving ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="shield" size={32} />} Selar Escritura
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Sub-componentes
        function EquipItem({ icon, label, value }) {
            return (
                <div className="flex flex-col gap-1 leading-none">
                    <span className="text-[8px] uppercase text-slate-600 font-bold ml-1 italic leading-none font-magic">{label}</span>
                    <div className="bg-slate-950/40 border border-white/5 p-3 rounded-xl flex items-center gap-3 leading-none italic uppercase text-[10px] text-slate-200 font-bold truncate">
                        <Icon name={icon} size={14} className="text-orange-500 opacity-60" /> {value || "---"}
                    </div>
                </div>
            );
        }

        function StatusBar({ label, val, max, col, edit, onDelta }) {
            const barColor = col === 'red' ? 'from-red-800 to-red-400' : 'from-sky-800 to-sky-400';
            return (
                <div className="space-y-4 leading-none font-magic uppercase italic text-white leading-none">
                    <div className="flex justify-between items-end leading-none">
                        <span className={`text-${col}-500 text-[10px] font-black tracking-[0.2em] leading-none`}>{label}</span>
                        <div className="flex items-center gap-4 leading-none">
                            {edit && <button onClick={()=>onDelta(-1)} className="text-slate-600 hover:text-white transition-colors text-2xl font-light outline-none leading-none">-</button>}
                            <span className="text-3xl font-black tabular-nums tracking-tighter leading-none">{val} <span className="text-slate-700 text-sm">/ {max}</span></span>
                            {edit && <button onClick={()=>onDelta(1)} className="text-slate-600 hover:text-white transition-colors text-2xl font-light outline-none leading-none">+</button>}
                        </div>
                    </div>
                    <div className="h-2.5 bg-slate-950 rounded-full border border-slate-800 overflow-hidden p-[1px] shadow-inner"><div className={`h-full bg-gradient-to-r ${barColor} transition-all duration-700 rounded-full`} style={{width: `${Math.min(100, (val/max)*100)}%`}} /></div>
                </div>
            );
        }

        function ListBlock({ title, content }) {
            const items = useMemo(() => !content ? [] : content.split(';').map(x => { const [n,d] = x.split(':'); return {n:n?.trim(), d:d?.trim()}; }).filter(x => x.n), [content]);
            return (
                <div className="w-full text-left leading-none font-magic uppercase italic">
                    <h4 className="text-[10px] text-orange-500 mb-4 tracking-widest leading-none font-black">{title}</h4>
                    <div className="glass-panel p-6 rounded-2xl flex flex-wrap gap-2 min-h-[50px] border-white/5 bg-slate-900/30 leading-none">
                        {items.length > 0 ? items.map((i, k) => (
                            <div key={k} className="relative group leading-none">
                                <div className="bg-slate-800 border border-white/5 px-4 py-2 rounded-xl text-[10px] font-black text-slate-300 shadow-sm hover:border-orange-500/30 transition-all cursor-help leading-none">{i.n}</div>
                                {i.d && (
                                    <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-4 w-64 p-6 bg-[#0a0a0a] border border-orange-500/30 rounded-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-[2000] pointer-events-none text-left shadow-2xl border-b-4 border-b-orange-600 leading-normal">
                                        <p className="text-[9px] font-black text-orange-500 uppercase mb-2 border-b border-white/5 pb-2 italic tracking-widest leading-tight">{i.n}</p>
                                        <p className="text-[12px] text-slate-300 font-medium italic leading-relaxed break-words">{i.d}</p>
                                    </div>
                                )}
                            </div>
                        )) : <span className="text-[9px] text-slate-700 font-black tracking-widest leading-none text-white font-magic uppercase">Vazio.</span>}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
