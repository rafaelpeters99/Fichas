<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire RPG - Versão Estável Local</title>
    
    <!-- Bibliotecas Base (Rodam direto no navegador) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .font-magic { font-family: 'Cinzel', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .input-hero {
            background: #020617 !important;
            border: 1px solid #1e293b !important;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            color: white !important;
            width: 100%;
            outline: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .input-hero:focus { border-color: #f97316 !important; background: #050a16 !important; }

        .editor-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }

        .editor-content {
            width: 100%;
            max-width: 1000px;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'grimoire_rpg_data_v1_stable';
        const MASTER_KEY = "MESTRE123";

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size, display: 'inline-block' }} className={className}></i>;
        };

        function App() {
            const [sessionNickname, setSessionNickname] = useState(() => localStorage.getItem('rpg_nickname') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('rpg_nickname'));
            const [role, setRole] = useState(() => localStorage.getItem('rpg_role') || 'player');

            const [characters, setCharacters] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : [];
            });

            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState(null);
            const [expandedCards, setExpandedCards] = useState({});
            const [storyCharId, setStoryCharId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [showGmLogin, setShowGmLogin] = useState(false);
            const [gmPass, setGmPass] = useState("");

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(characters));
            }, [characters]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!sessionNickname.trim()) return;
                localStorage.setItem('rpg_nickname', sessionNickname.trim());
                localStorage.setItem('rpg_role', 'player');
                setIsLoggedIn(true);
            };

            const handleGmLogin = (e) => {
                e.preventDefault();
                if (gmPass === MASTER_KEY) {
                    localStorage.setItem('rpg_nickname', 'Mestre');
                    localStorage.setItem('rpg_role', 'gm');
                    setSessionNickname('Mestre');
                    setRole('gm');
                    setIsLoggedIn(true);
                } else alert("Chave incorreta.");
            };

            const handleLogout = () => {
                localStorage.removeItem('rpg_nickname');
                localStorage.removeItem('rpg_role');
                setIsLoggedIn(false);
                window.location.reload();
            };

            const saveChar = () => {
                if (!formData.name?.trim()) return alert("O herói precisa de um nome!");
                setIsSaving(true);

                const id = editingId === 'new' ? Math.random().toString(36).substr(2, 9) : editingId;
                const data = { 
                    ...formData, 
                    id, 
                    updatedAt: Date.now(),
                    ownerNickname: formData.ownerNickname || sessionNickname
                };

                if (editingId === 'new') {
                    setCharacters([data, ...characters]);
                } else {
                    setCharacters(characters.map(c => c.id === editingId ? data : c));
                }

                setIsSaving(false);
                setEditingId(null);
                setFormData(null);
            };

            const deleteChar = (id) => {
                if (confirm("Apagar este herói do registo local?")) {
                    setCharacters(characters.filter(c => c.id !== id));
                }
            };

            const updateStat = (id, field, delta, maxField) => {
                setCharacters(prev => prev.map(c => {
                    if (c.id !== id) return c;
                    let val = (Number(c[field]) || 0) + delta;
                    if (maxField) val = Math.min(val, Number(c[maxField]) || 999);
                    return { ...c, [field]: Math.max(0, val) };
                }));
            };

            const filtered = useMemo(() => {
                if (role === 'gm') return characters;
                return characters.filter(c => !c.isHidden || c.ownerNickname?.toLowerCase() === sessionNickname.toLowerCase());
            }, [characters, role, sessionNickname]);

            const selectedStoryChar = useMemo(() => characters.find(c => c.id === storyCharId), [characters, storyCharId]);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                        <div className="glass-panel p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
                            <div className="text-orange-500 mb-6 flex justify-center"><Icon name="shield" size={48} /></div>
                            <h1 className="text-4xl font-magic font-black uppercase mb-10 text-white">Grimoire</h1>
                            {!showGmLogin ? (
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <input type="text" value={sessionNickname} onChange={e => setSessionNickname(e.target.value)} placeholder="Teu Nickname" className="stat-input py-4 w-full text-white bg-slate-900 border border-slate-800 rounded-xl px-4 text-center outline-none focus:border-orange-500" />
                                    <button className="w-full bg-orange-600 p-4 rounded-xl font-black uppercase text-sm shadow-lg hover:bg-orange-500 transition-all">Entrar</button>
                                    <button type="button" onClick={() => setShowGmLogin(true)} className="text-slate-500 text-xs font-bold uppercase mt-4 block mx-auto tracking-widest">Painel Mestre</button>
                                </form>
                            ) : (
                                <form onSubmit={handleGmLogin} className="space-y-6">
                                    <input type="password" value={gmPass} onChange={e => setGmPass(e.target.value)} placeholder="Chave do Mestre" className="stat-input py-4 w-full text-white bg-slate-900 border border-slate-800 rounded-xl px-4 text-center outline-none focus:border-orange-500" />
                                    <button className="w-full bg-white text-slate-950 p-4 rounded-xl font-black uppercase text-sm">Validar</button>
                                    <button type="button" onClick={() => setShowGmLogin(false)} className="text-slate-500 text-xs font-bold uppercase mt-4 block mx-auto tracking-widest">Voltar</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-[1600px] mx-auto p-4 md:p-12 animate-in min-h-screen">
                    <header className="flex justify-between items-center mb-16">
                        <div className="flex items-center gap-6">
                            <div className="text-orange-500 p-3 glass-panel rounded-xl"><Icon name="shield" size={32} /></div>
                            <div>
                                <h1 className="text-3xl md:text-5xl font-magic font-black uppercase text-white leading-none">Grimoire</h1>
                                <p className="text-[10px] font-black uppercase text-slate-500 mt-1 italic tracking-widest">{sessionNickname} • Modo Local</p>
                            </div>
                        </div>
                        <button onClick={handleLogout} className="p-4 glass-panel rounded-xl text-slate-500 hover:text-red-500 transition-all"><Icon name="log-out" /></button>
                    </header>

                    <div className="flex justify-between items-center mb-12">
                        <span className="text-[10px] uppercase tracking-widest text-slate-500 border-l border-orange-500 pl-4 font-bold">{filtered.length} Heróis Registados</span>
                        <button onClick={() => { setFormData({ name: "", hp: 10, hpMax: 10, slots: 2, slotsMax: 2, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 1, ownerNickname: role === 'gm' ? "" : sessionNickname, isHidden: false, history: "", skills: "", abilities: "", inventory: "", weapon: "", armor: "", accessory: "", imageUrl: "" }); setEditingId('new'); }} className="bg-orange-600 p-5 rounded-full shadow-xl hover:scale-110 active:scale-95 transition-all"><Icon name="plus" size={24}/></button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 pb-20">
                        {filtered.length === 0 ? (
                            <div className="col-span-full py-20 text-center opacity-20 font-magic uppercase italic tracking-widest">Aguardando novos viajantes...</div>
                        ) : filtered.map(char => {
                            const isOwner = char.ownerNickname?.toLowerCase() === sessionNickname.toLowerCase();
                            const hasAccess = isOwner || role === 'gm';
                            const isExpanded = expandedCards[char.id];
                            return (
                                <div key={char.id} className={`glass-panel rounded-[3rem] border-2 ${isOwner ? 'border-orange-500/30 shadow-orange-900/10' : 'border-transparent'} flex flex-col shadow-2xl transition-all duration-500 relative z-10 hover:z-30`}>
                                    
                                    {/* SEÇÃO DA IMAGEM: Expande apenas quando o mouse está sobre ELA */}
                                    <div className="relative h-64 hover:h-auto hover:aspect-square bg-slate-950 overflow-hidden rounded-t-[3rem] border-b border-white/5 transition-all duration-700 ease-in-out group/photo">
                                        {char.imageUrl ? (
                                            <img src={char.imageUrl} className="w-full h-full object-cover opacity-80 transition-opacity group-hover/photo:opacity-100" />
                                        ) : (
                                            <div className="h-full flex items-center justify-center opacity-10 text-slate-800">
                                                <Icon name="user" size={64} />
                                            </div>
                                        )}
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950/80 to-transparent group-hover/photo:opacity-0 transition-opacity duration-700"></div>
                                        
                                        <div className="absolute top-4 left-4 flex gap-2 pointer-events-none">
                                            {isOwner && <div className="bg-orange-500 text-slate-950 font-black px-3 py-1 rounded-full text-[8px] uppercase tracking-widest leading-none">MEU HERÓI</div>}
                                        </div>
                                        
                                        {hasAccess && (
                                            <button onClick={() => setStoryCharId(char.id)} className="absolute bottom-4 right-6 text-white/40 font-magic uppercase text-[8px] tracking-widest opacity-0 hover:text-white transition-all flex items-center gap-2 italic group-hover/photo:opacity-100 bg-black/40 px-3 py-1.5 rounded-full backdrop-blur-sm">
                                                Ler Crónica <Icon name="scroll-text" size={14} />
                                            </button>
                                        )}
                                    </div>

                                    <div className="p-8">
                                        <div className="flex justify-between items-start mb-10 gap-4">
                                            <div className="flex-1 min-w-0">
                                                <h3 className="text-3xl font-magic font-black uppercase italic leading-none text-white mb-2 truncate">{char.name}</h3>
                                                <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest leading-none mt-2">{char.ownerNickname} • Nível {char.level}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                {hasAccess && <button onClick={() => { setEditingId(char.id); setFormData(char); }} className="p-3 glass-panel rounded-xl text-orange-500 hover:bg-orange-500/10 transition-colors shadow-inner"><Icon name="edit-3" size={18}/></button>}
                                                {role === 'gm' && <button onClick={() => deleteChar(char.id)} className="p-3 glass-panel rounded-xl text-red-500 hover:bg-red-500/10 transition-colors"><Icon name="trash-2" size={18}/></button>}
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                            <StatusBar label="Vida" val={char.hp} max={char.hpMax} col="red" edit={hasAccess} onDelta={d => updateStat(char.id, 'hp', d, 'hpMax')} />
                                            <StatusBar label="Magia" val={char.slots} max={char.slotsMax} col="sky" edit={hasAccess} onDelta={d => updateStat(char.id, 'slots', d, 'slotsMax')} />
                                        </div>
                                        
                                        {hasAccess && (
                                            <div className="space-y-6">
                                                <div className="grid grid-cols-6 gap-2">
                                                    {['str','dex','con','int','wis','cha'].map(a => (<div key={a} className="glass-panel py-3 rounded-2xl text-center group hover:border-orange-500/30 transition-all leading-none"><div className="text-[8px] text-slate-600 uppercase mb-1 font-black group-hover:text-orange-500 leading-none">{a}</div><div className="text-xl font-magic font-black text-white leading-none">{char[a] || 10}</div></div>))}
                                                </div>

                                                <button onClick={() => setExpandedCards(p => ({...p, [char.id]: !p[char.id]}))} className={`w-full p-4 rounded-2xl font-magic font-black uppercase text-[9px] tracking-[0.3em] transition-all flex justify-between items-center ${isExpanded ? 'bg-orange-600 text-white shadow-xl' : 'glass-panel text-slate-500'}`}>
                                                    <span>Mochila & Equipamento</span>
                                                    <span>{isExpanded ? '▲' : '▼'}</span>
                                                </button>

                                                {isExpanded && (
                                                    <div className="grid grid-cols-1 gap-6 animate-in">
                                                        <div className="glass-panel p-6 rounded-2xl border-white/5 bg-slate-900/40">
                                                            <h4 className="text-[9px] font-black text-orange-500 uppercase mb-4 tracking-widest italic leading-none">Equipamento Atual</h4>
                                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                                                <EquipItem icon="sword" label="Arma" value={char.weapon} />
                                                                <EquipItem icon="shield" label="Armadura" value={char.armor} />
                                                                <EquipItem icon="gem" label="Acessório" value={char.accessory} />
                                                            </div>
                                                        </div>

                                                        <div className="space-y-4">
                                                            <ListBlock title="Perícias" content={char.skills} /> 
                                                            <ListBlock title="Habilidades" content={char.abilities} />
                                                        </div>
                                                        <div className="glass-panel p-6 rounded-2xl border-white/5 bg-slate-900/20">
                                                            <h4 className="text-[9px] font-black text-orange-500 uppercase mb-3 flex items-center gap-2 italic leading-none"><Icon name="package" size={14}/> Mochila</h4>
                                                            <p className="text-xs text-slate-400 italic whitespace-pre-wrap leading-relaxed break-words">{char.inventory || "Carga nula."}</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* MODAL CRÓNICA */}
                    {selectedStoryChar && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[2000] flex items-center justify-center p-4" onClick={()=>setStoryCharId(null)}>
                            <div className="bg-slate-900 border border-white/10 w-full max-w-2xl rounded-3xl p-8 lg:p-12 relative shadow-2xl animate-in" onClick={e=>e.stopPropagation()}>
                                <button onClick={() => setStoryCharId(null)} className="absolute top-6 right-6 text-slate-500 hover:text-white transition-all"><Icon name="x" size={24}/></button>
                                <h2 className="text-3xl font-black font-serif italic text-white uppercase mb-8 border-b border-white/5 pb-6 leading-none">Crónica: {selectedStoryChar.name}</h2>
                                <div className="text-slate-300 italic font-serif leading-loose text-lg whitespace-pre-wrap max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar break-words">{selectedStoryChar.history || "Este herói ainda não registou o seu passado."}</div>
                            </div>
                        </div>
                    )}

                    {/* MODAL EDITOR */}
                    {editingId && formData && (
                        <div className="editor-overlay">
                            <div className="editor-content glass-panel animate-in">
                                <div className="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/80">
                                    <div className="flex items-center gap-3 text-orange-500 font-magic italic leading-none"><Icon name="shield" size={24}/><h2 className="text-xl uppercase tracking-tighter leading-none">Forjar Destino</h2></div>
                                    <button onClick={() => setEditingId(null)} className="p-2 text-slate-400 hover:text-white transition-colors"><Icon name="x" size={24}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 custom-scrollbar bg-[#020617]/50">
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-10 text-white font-black">
                                        <div className="md:col-span-4 space-y-6">
                                            <div className="space-y-1.5 text-left"><label className="text-[10px] uppercase text-slate-500 ml-1 leading-none italic font-bold">Identidade</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="input-hero text-lg font-magic uppercase text-orange-500" /></div>
                                            
                                            <label className="flex flex-col items-center justify-center h-48 bg-slate-950 border-2 border-dashed border-slate-800 hover:border-orange-500/40 rounded-xl cursor-pointer transition-all overflow-hidden relative">
                                                {formData.imageUrl ? <img src={formData.imageUrl} className="w-full h-full object-cover" /> : <div className="text-slate-800 opacity-30"><Icon name="user" size={40}/></div>}
                                                <input type="file" accept="image/*" className="hidden" onChange={(e) => {
                                                    const file = e.target.files[0]; if (!file) return;
                                                    const reader = new FileReader();
                                                    reader.onload = (ev) => {
                                                        const img = new Image(); img.onload = () => {
                                                            const canvas = document.createElement('canvas'); 
                                                            canvas.width = 500; canvas.height = 500; 
                                                            const ctx = canvas.getContext('2d');
                                                            const min = Math.min(img.width, img.height);
                                                            ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, 500, 500);
                                                            setFormData(prev => ({ ...prev, imageUrl: canvas.toDataURL('image/jpeg', 0.6) }));
                                                        }; img.src = ev.target.result;
                                                    }; reader.readAsDataURL(file);
                                                }}/>
                                            </label>

                                            <div className="grid grid-cols-2 gap-4 text-left">
                                                <div className="space-y-1.5"><label className="text-[8px] uppercase text-slate-600 leading-none font-bold">Nível</label><input type="number" value={formData.level} onChange={e => setFormData({...formData, level: Number(e.target.value)})} className="input-hero" /></div>
                                                <div className="space-y-1.5"><label className="text-[8px] uppercase text-slate-600 leading-none font-bold">Dono</label><input type="text" disabled={role !== 'gm'} value={formData.ownerNickname} onChange={e => setFormData({...formData, ownerNickname: e.target.value})} className="input-hero text-[10px] text-orange-500 uppercase font-black" /></div>
                                            </div>

                                            <div className="space-y-4 pt-4 border-t border-white/5">
                                                <h3 className="text-[10px] uppercase text-orange-500 tracking-widest font-bold">Equipamento Ativo</h3>
                                                <div className="space-y-3">
                                                    <div className="space-y-1"><label className="text-[8px] uppercase text-slate-500 font-bold ml-1 italic leading-none">Arma</label><input type="text" value={formData.weapon} onChange={e => setFormData({...formData, weapon: e.target.value})} className="input-hero text-xs" placeholder="Ex: Espada Curta" /></div>
                                                    <div className="space-y-1"><label className="text-[8px] uppercase text-slate-500 font-bold ml-1 italic leading-none">Armadura</label><input type="text" value={formData.armor} onChange={e => setFormData({...formData, armor: e.target.value})} className="input-hero text-xs" placeholder="Ex: Cota de Malha" /></div>
                                                    <div className="space-y-1"><label className="text-[8px] uppercase text-slate-500 font-bold ml-1 italic leading-none">Acessório</label><input type="text" value={formData.accessory} onChange={e => setFormData({...formData, accessory: e.target.value})} className="input-hero text-xs" placeholder="Ex: Anel de Fogo" /></div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="md:col-span-8 space-y-10 text-center">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                                <div className="glass-panel p-6 rounded-2xl group transition-colors hover:border-red-500/20 shadow-inner">
                                                    <label className="text-[10px] uppercase text-red-500 block mb-4 italic opacity-60 font-black tracking-widest leading-none">Vitalidade Máxima</label>
                                                    <input type="number" value={formData.hpMax} onChange={e => setFormData({...formData, hpMax: Number(e.target.value), hp: Number(e.target.value)})} className="bg-transparent text-5xl font-magic text-red-500 text-center w-full outline-none" />
                                                </div>
                                                <div className="glass-panel p-6 rounded-2xl group transition-colors hover:border-sky-500/20 shadow-inner">
                                                    <label className="text-[10px] uppercase text-sky-500 block mb-4 italic opacity-60 font-black tracking-widest leading-none">Arcanismo Máximo</label>
                                                    <input type="number" value={formData.slotsMax} onChange={e => setFormData({...formData, slotsMax: Number(e.target.value), slots: Number(e.target.value)})} className="bg-transparent text-5xl font-magic text-sky-400 text-center w-full outline-none" />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-6 gap-3">
                                                {['str','dex','con','int','wis','cha'].map(a => (<div key={a} className="space-y-2"><label className="text-[9px] uppercase text-slate-500 text-center block italic leading-none">{a}</label><input type="number" value={formData[a]} onChange={e => setFormData({...formData, [a]: Number(e.target.value)})} className="input-hero py-3 font-magic text-xl text-center font-black" /></div>))}
                                            </div>
                                            <div className="space-y-3 text-left">
                                                <label className="text-[10px] uppercase text-slate-500 italic ml-2 tracking-widest leading-none font-bold">Crónica do Herói (História)</label>
                                                <textarea value={formData.history} onChange={e => setFormData({...formData, history: e.target.value})} className="input-hero h-32 text-left text-sm font-serif italic resize-none custom-scrollbar p-4" />
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="space-y-3 text-left"><label className="text-[10px] uppercase text-slate-500 italic ml-2 tracking-widest leading-none font-bold">Perícias</label><textarea value={formData.skills} onChange={e => setFormData({...formData, skills: e.target.value})} className="input-hero h-32 text-left text-xs italic resize-none custom-scrollbar p-4" placeholder="Nome: Descrição;" /></div>
                                                <div className="space-y-3 text-left"><label className="text-[10px] uppercase text-slate-500 italic ml-2 tracking-widest leading-none font-bold">Habilidades</label><textarea value={formData.abilities} onChange={e => setFormData({...formData, abilities: e.target.value})} className="input-hero h-32 text-left text-xs italic resize-none custom-scrollbar p-4" placeholder="Nome: Descrição;" /></div>
                                            </div>
                                            <div className="space-y-1.5 text-left pt-4"><label className="text-[10px] uppercase text-slate-500 italic ml-1 leading-none font-bold">Mochila (Itens diversos)</label><textarea value={formData.inventory} onChange={e => setFormData({...formData, inventory: e.target.value})} className="input-hero h-24 text-left text-xs italic resize-none custom-scrollbar" /></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8 border-t border-white/10 bg-slate-900/90 flex justify-center shadow-inner">
                                    <button onClick={saveChar} disabled={isSaving} className="w-full max-w-xl bg-orange-600 p-5 rounded-2xl text-2xl font-magic font-black uppercase tracking-[0.4em] shadow-xl hover:bg-orange-500 transition-all flex justify-center items-center gap-6 active:scale-95 disabled:opacity-50 leading-none">
                                        {isSaving ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="shield" size={32} />} Selar Escritura
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SUB-COMPONENTES ---
        function EquipItem({ icon, label, value }) {
            return (
                <div className="flex flex-col gap-1">
                    <span className="text-[8px] uppercase text-slate-600 font-bold ml-1 italic leading-none">{label}</span>
                    <div className="bg-slate-950/40 border border-white/5 p-3 rounded-xl flex items-center gap-3">
                        <Icon name={icon} size={14} className="text-orange-500 opacity-60" />
                        <span className="text-[10px] text-slate-200 font-bold truncate italic">{value || "---"}</span>
                    </div>
                </div>
            );
        }

        function StatusBar({ label, val, max, col, edit, onDelta }) {
            const barColor = col === 'red' ? 'from-red-800 to-red-400' : 'from-sky-800 to-sky-400';
            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-end text-white">
                        <span className={`text-${col}-500 text-[10px] font-black uppercase tracking-[0.2em] mb-1 italic leading-none`}>{label}</span>
                        <div className="flex items-center gap-4 leading-none">
                            {edit && <button onClick={()=>onDelta(-1)} className="text-slate-600 hover:text-white transition-colors text-2xl font-light outline-none">-</button>}
                            <span className="text-3xl font-magic font-black tabular-nums tracking-tighter leading-none">{val} <span className="text-slate-700 text-sm italic leading-none">/ {max}</span></span>
                            {edit && <button onClick={()=>onDelta(1)} className="text-slate-600 hover:text-white transition-colors text-2xl font-light outline-none">+</button>}
                        </div>
                    </div>
                    <div className="h-2.5 bg-slate-950 rounded-full border border-slate-800 overflow-hidden p-[1px] shadow-inner"><div className={`h-full bg-gradient-to-r ${barColor} transition-all duration-700 rounded-full`} style={{width: `${Math.min(100, (val/max)*100)}%`}} /></div>
                </div>
            );
        }

        function ListBlock({ title, content }) {
            const items = useMemo(() => !content ? [] : content.split(';').map(x => { const [n,d] = x.split(':'); return {n:n?.trim(), d:d?.trim()}; }).filter(x => x.n), [content]);
            return (
                <div className="w-full text-left">
                    <h4 className="font-magic font-black uppercase text-[10px] text-orange-500 mb-4 tracking-widest italic leading-none">{title}</h4>
                    <div className="glass-panel p-6 rounded-2xl flex flex-wrap gap-2 min-h-[50px] border-white/5 bg-slate-900/30">
                        {items.length > 0 ? items.map((i, k) => (
                            <div key={k} className="relative group leading-none">
                                <div className="bg-slate-800 border border-white/5 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-slate-300 italic shadow-sm hover:border-orange-500/30 transition-all cursor-help">{i.n}</div>
                                {i.d && (
                                    <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-4 w-64 p-6 bg-[#0a0a0a] border border-orange-500/30 rounded-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-[2000] pointer-events-none text-left shadow-2xl border-b-4 border-b-orange-600 leading-normal">
                                        <p className="text-[9px] font-black text-orange-500 uppercase mb-2 border-b border-white/5 pb-2 italic tracking-widest leading-tight">{i.n}</p>
                                        <p className="text-[12px] text-slate-300 font-medium italic leading-relaxed break-words">{i.d}</p>
                                    </div>
                                )}
                            </div>
                        )) : <span className="text-[9px] text-slate-700 font-black uppercase tracking-widest italic leading-none">Vazio.</span>}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
