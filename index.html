<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire RPG - Salas Online</title>
    
    <!-- Bibliotecas Base via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Version 11+) -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .font-magic { font-family: 'Cinzel', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .room-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .room-card:hover {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.05);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(249, 115, 22, 0.2);
        }

        .editor-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
        }

        .editor-content {
            width: 100%;
            max-width: 1000px;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-input {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            padding: 0.5rem;
            text-align: center;
            color: white;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        .stat-input:focus {
            border-color: #f97316;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Fix: script type="text/babel" and data-type="module" to allow JSX + ESM Imports -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc, query } from "firebase/firestore";

        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rpg-default-id';
        const MASTER_KEY = "MESTRE123";

        // ÍCONES SVG
        const Icons = {
            Shield: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Plus: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Logout: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Door: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>,
            X: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Loader: ({size=24}) => <svg className="animate-spin" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            Trash: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        };

        function App() {
            const [user, setUser] = useState(null);
            const [sessionNickname, setSessionNickname] = useState(localStorage.getItem('rpg_nickname') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('rpg_nickname'));
            const [role, setRole] = useState(localStorage.getItem('rpg_role') || 'player');

            const [rooms, setRooms] = useState([]);
            const [currentRoom, setCurrentRoom] = useState(null);
            const [isCreatingRoom, setIsCreatingRoom] = useState(false);
            const [newRoomName, setNewRoomName] = useState("");

            const [characters, setCharacters] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [gmPass, setGmPass] = useState("");
            const [showGmLogin, setShowGmLogin] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");

            // --- 1. AUTENTICAÇÃO (Rule 3) ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        setErrorMsg("Erro na autenticação. Tente recarregar.");
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // --- 2. ESCUTAR SALAS (Public Data - Rule 1 & 2) ---
            useEffect(() => {
                if (!user) return;
                const roomsCol = collection(db, 'artifacts', appId, 'public', 'data', 'rooms');
                const unsubscribe = onSnapshot(roomsCol, (snapshot) => {
                    setRooms(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => {
                    console.error("Firestore Permission Error (Rooms):", err);
                });
                return () => unsubscribe();
            }, [user]);

            // --- 3. ESCUTAR PERSONAGENS (Rule 1 & 2) ---
            useEffect(() => {
                if (!user || !currentRoom) return;
                const charCol = collection(db, 'artifacts', appId, 'public', 'data', 'characters');
                const unsubscribe = onSnapshot(charCol, (snapshot) => {
                    const allChars = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    // Filtering in JS memory as per Rule 2
                    setCharacters(allChars.filter(c => c.roomId === currentRoom.id));
                }, (err) => {
                    console.error("Firestore Permission Error (Chars):", err);
                });
                return () => unsubscribe();
            }, [user, currentRoom]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!sessionNickname.trim()) return;
                localStorage.setItem('rpg_nickname', sessionNickname.trim());
                localStorage.setItem('rpg_role', 'player');
                setIsLoggedIn(true);
            };

            const handleGmLogin = (e) => {
                e.preventDefault();
                if (gmPass === MASTER_KEY) {
                    localStorage.setItem('rpg_nickname', 'Mestre');
                    localStorage.setItem('rpg_role', 'gm');
                    setSessionNickname('Mestre');
                    setRole('gm');
                    setIsLoggedIn(true);
                } else {
                    setErrorMsg("Chave do Mestre incorreta.");
                    setTimeout(() => setErrorMsg(""), 3000);
                }
            };

            const handleLogout = () => {
                localStorage.clear();
                window.location.reload();
            };

            const handleCreateRoom = async () => {
                if (!newRoomName.trim() || !user) return;
                try {
                    const roomsCol = collection(db, 'artifacts', appId, 'public', 'data', 'rooms');
                    const roomDoc = doc(roomsCol);
                    await setDoc(roomDoc, {
                        name: newRoomName.trim(),
                        master: sessionNickname,
                        createdAt: Date.now()
                    });
                    setNewRoomName("");
                    setIsCreatingRoom(false);
                } catch (e) {
                    setErrorMsg("Erro ao criar sala.");
                }
            };

            const handleSaveChar = async () => {
                if (!formData.name?.trim() || !user) return;
                setIsSaving(true);
                try {
                    const charCol = collection(db, 'artifacts', appId, 'public', 'data', 'characters');
                    const charDoc = editingId === 'new' ? doc(charCol) : doc(charCol, editingId);
                    
                    await setDoc(charDoc, {
                        ...formData,
                        roomId: currentRoom.id,
                        updatedAt: Date.now(),
                        ownerNickname: formData.ownerNickname || sessionNickname
                    }, { merge: true });

                    setEditingId(null);
                    setFormData(null);
                } catch (e) {
                    setErrorMsg("Erro ao guardar herói.");
                } finally {
                    setIsSaving(false);
                }
            };

            const handleUpdateStat = async (id, field, delta, maxField) => {
                if (!user) return;
                const char = characters.find(c => c.id === id);
                if (!char) return;
                let val = (Number(char[field]) || 0) + delta;
                if (maxField) val = Math.min(val, Number(char[maxField]) || 999);
                const charDoc = doc(db, 'artifacts', appId, 'public', 'data', 'characters', id);
                await updateDoc(charDoc, { [field]: Math.max(0, val) });
            };

            // --- TELAS ---
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617]">
                        <div className="glass-panel p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl animate-in">
                            <div className="text-orange-500 mb-6 flex justify-center"><Icons.Shield size={48} /></div>
                            <h1 className="text-4xl font-magic font-black uppercase mb-10 text-white">Grimoire</h1>
                            {errorMsg && <p className="text-red-500 text-xs mb-4 font-bold">{errorMsg}</p>}
                            {!showGmLogin ? (
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <input 
                                        type="text" 
                                        value={sessionNickname} 
                                        onChange={e => setSessionNickname(e.target.value)} 
                                        placeholder="Teu Nickname" 
                                        className="stat-input py-4" 
                                    />
                                    <button className="w-full bg-orange-600 p-4 rounded-xl font-black uppercase text-sm hover:bg-orange-500 transition-colors shadow-lg">Entrar</button>
                                    <button type="button" onClick={() => setShowGmLogin(true)} className="text-slate-500 text-xs font-bold uppercase mt-4 hover:text-slate-300">Acesso Mestre</button>
                                </form>
                            ) : (
                                <form onSubmit={handleGmLogin} className="space-y-6">
                                    <input 
                                        type="password" 
                                        value={gmPass} 
                                        onChange={e => setGmPass(e.target.value)} 
                                        placeholder="Chave do Mestre" 
                                        className="stat-input py-4" 
                                    />
                                    <button className="w-full bg-white text-slate-950 p-4 rounded-xl font-black uppercase text-sm hover:bg-slate-200 transition-colors">Validar</button>
                                    <button type="button" onClick={() => setShowGmLogin(false)} className="text-slate-500 text-xs font-bold uppercase mt-4 hover:text-slate-300">Voltar</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            // LOBBY
            if (!currentRoom) {
                return (
                    <div className="max-w-[800px] mx-auto p-8 md:p-20 min-h-screen">
                        <header className="flex justify-between items-center mb-16">
                            <div>
                                <h1 className="text-4xl font-magic font-black uppercase text-white">Salas</h1>
                                <p className="text-xs text-slate-500 uppercase tracking-widest mt-2">Sessões Ativas • {sessionNickname}</p>
                            </div>
                            <button onClick={handleLogout} title="Sair" className="p-3 glass-panel rounded-xl text-slate-500 hover:text-red-500 transition-colors"><Icons.Logout /></button>
                        </header>

                        <div className="grid grid-cols-1 gap-6">
                            {role === 'gm' && (
                                <button onClick={() => setIsCreatingRoom(true)} className="glass-panel p-8 rounded-3xl border-dashed border-2 border-slate-800 hover:border-orange-500/40 transition-all flex flex-col items-center gap-4 group">
                                    <div className="bg-orange-600/10 p-4 rounded-full text-orange-500 group-hover:scale-110 transition-transform"><Icons.Plus size={32}/></div>
                                    <span className="font-magic font-black uppercase text-sm tracking-widest text-orange-500">Forjar Nova Sala</span>
                                </button>
                            )}

                            {rooms.length === 0 ? (
                                <div className="py-20 text-center opacity-20 font-magic uppercase italic tracking-widest">Aguardando que o Mestre inicie uma crónica...</div>
                            ) : rooms.map(room => (
                                <div key={room.id} onClick={() => setCurrentRoom(room)} className="glass-panel p-8 rounded-3xl room-card flex justify-between items-center group">
                                    <div className="flex items-center gap-6">
                                        <div className="text-orange-500/40 group-hover:text-orange-500"><Icons.Shield size={32}/></div>
                                        <div>
                                            <h3 className="text-2xl font-magic font-black uppercase text-white leading-none">{room.name}</h3>
                                            <p className="text-[10px] text-slate-500 uppercase font-black mt-2 tracking-widest">Mestre: {room.master}</p>
                                        </div>
                                    </div>
                                    <div className="text-slate-700 group-hover:text-white transition-colors"><Icons.Door size={24}/></div>
                                </div>
                            ))}
                        </div>

                        {isCreatingRoom && (
                            <div className="editor-overlay">
                                <div className="glass-panel p-10 rounded-3xl w-full max-w-sm text-center border border-orange-500/30">
                                    <h2 className="text-xl font-magic font-black uppercase text-orange-500 mb-8 tracking-widest">Nova Seção</h2>
                                    <input 
                                        autoFocus 
                                        type="text" 
                                        value={newRoomName} 
                                        onChange={e => setNewRoomName(e.target.value)} 
                                        placeholder="Nome da Mesa..." 
                                        className="stat-input py-4 mb-6" 
                                    />
                                    <div className="flex gap-4">
                                        <button onClick={() => setIsCreatingRoom(false)} className="flex-1 bg-slate-900 p-4 rounded-xl font-black uppercase text-xs text-slate-500 hover:bg-slate-800">Cancelar</button>
                                        <button onClick={handleCreateRoom} className="flex-1 bg-orange-600 p-4 rounded-xl font-black uppercase text-xs text-white shadow-lg hover:bg-orange-500">Criar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // SALA DE JOGO
            return (
                <div className="max-w-[1600px] mx-auto p-4 md:p-12 min-h-screen">
                    <header className="flex justify-between items-center mb-16">
                        <div className="flex items-center gap-6">
                            <div className="text-orange-500 p-4 glass-panel rounded-2xl border border-orange-500/20"><Icons.Shield size={32} /></div>
                            <div>
                                <h1 className="text-4xl md:text-5xl font-magic font-black uppercase text-white leading-none tracking-tight">{currentRoom.name}</h1>
                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mt-2 italic">{sessionNickname} • Realtime Mode</p>
                            </div>
                        </div>
                        <button onClick={() => setCurrentRoom(null)} className="p-4 glass-panel rounded-xl text-slate-500 hover:text-orange-500 transition-colors flex items-center gap-3">
                            <Icons.Door size={20}/> <span className="hidden md:block text-[10px] font-black uppercase tracking-tighter">Mudar Sala</span>
                        </button>
                    </header>

                    <div className="flex justify-between items-center mb-10">
                        <div className="glass-panel px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border-orange-500/10 text-slate-400">
                            {characters.length} Viajantes Conectados
                        </div>
                        <button onClick={() => { setFormData({ name: "", hp: 10, hpMax: 10, slots: 2, slotsMax: 2, speed: 9, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 1, ownerNickname: role === 'gm' ? "" : sessionNickname, isHidden: false, history: "", skills: "", imageUrl: "" }); setEditingId('new'); }} className="bg-orange-600 p-5 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all"><Icons.Plus size={24}/></button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 pb-20">
                        {characters.length === 0 ? (
                            <div className="col-span-full py-20 text-center opacity-20 font-magic uppercase italic tracking-widest">Aguardando registros nesta mesa...</div>
                        ) : characters.map(char => {
                            const isOwner = char.ownerNickname?.toLowerCase() === sessionNickname.toLowerCase();
                            const hasAccess = isOwner || role === 'gm';
                            return (
                                <div key={char.id} className={`glass-panel rounded-[3rem] overflow-hidden border-2 ${isOwner ? 'border-orange-500/30 shadow-orange-900/10' : 'border-transparent'} flex flex-col shadow-2xl transition-all duration-500`}>
                                    <div className="relative h-64 bg-slate-950 overflow-hidden border-b border-white/5">
                                        {char.imageUrl ? <img src={char.imageUrl} className="w-full h-full object-cover opacity-80" alt={char.name} /> : <div className="h-full flex items-center justify-center opacity-10 text-slate-800"><Icons.Shield size={64} /></div>}
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950/80 to-transparent"></div>
                                        <div className="absolute top-6 left-8 flex gap-2">
                                            {isOwner && <div className="bg-orange-500 text-slate-950 font-black px-4 py-1.5 rounded-full text-[9px] uppercase tracking-widest shadow-lg">Meu Herói</div>}
                                        </div>
                                    </div>
                                    <div className="p-8">
                                        <div className="flex justify-between items-start mb-10 gap-4">
                                            <div className="flex-1">
                                                <h3 className="text-3xl font-magic font-black uppercase italic leading-none text-white">{char.name}</h3>
                                                <p className="text-[10px] text-slate-500 mt-2 font-black uppercase italic tracking-widest">{char.ownerNickname} • Nível {char.level}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                {hasAccess && <button onClick={() => { setEditingId(char.id); setFormData(char); }} title="Editar" className="p-3 glass-panel rounded-xl text-orange-500 hover:bg-orange-500/10 transition-colors shadow-inner"><Icons.Plus size={18}/></button>}
                                                {role === 'gm' && <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'characters', char.id))} title="Apagar" className="p-3 glass-panel rounded-xl text-red-500 hover:bg-red-500/10 transition-colors"><Icons.Trash size={18}/></button>}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <StatusBar label="Vitalidade" val={char.hp} max={char.hpMax} col="red" edit={hasAccess} onDelta={d => handleUpdateStat(char.id, 'hp', d, 'hpMax')} />
                                            <StatusBar label="Arcanismo" val={char.slots} max={char.slotsMax} col="sky" edit={hasAccess} onDelta={d => handleUpdateStat(char.id, 'slots', d, 'slotsMax')} />
                                        </div>
                                        
                                        {hasAccess && (
                                            <div className="mt-10 pt-10 border-t border-white/5">
                                                <div className="grid grid-cols-6 gap-2">
                                                    {['str','dex','con','int','wis','cha'].map(a => (
                                                        <div key={a} className="glass-panel py-3 rounded-2xl text-center group transition-colors hover:border-orange-500/30">
                                                            <div className="text-[8px] text-slate-600 uppercase mb-1 font-black group-hover:text-orange-500 leading-none">{a}</div>
                                                            <div className="text-xl font-magic font-black text-white leading-none">{char[a] || 10}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {editingId && formData && (
                        <div className="editor-overlay">
                            <div className="editor-content glass-panel">
                                <div className="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/80">
                                    <div className="flex items-center gap-3 text-orange-500 font-magic italic"><Icons.Shield size={24}/><h2 className="text-xl uppercase tracking-tighter leading-none">Mudar o Destino</h2></div>
                                    <button onClick={() => setEditingId(null)} className="p-2 text-slate-400 hover:text-white transition-colors"><Icons.X size={24}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 custom-scrollbar bg-[#020617]/50">
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-10 text-white font-black">
                                        <div className="md:col-span-4 space-y-6">
                                            <div className="space-y-1.5"><label className="text-[10px] uppercase text-slate-500 ml-1">Nome do Herói</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="stat-input text-lg text-orange-500 font-magic uppercase" placeholder="..." /></div>
                                            
                                            <label className="flex flex-col items-center justify-center h-56 bg-slate-950 border-2 border-dashed border-slate-800 hover:border-orange-500/50 rounded-2xl cursor-pointer transition-all overflow-hidden relative">
                                                {formData.imageUrl ? <img src={formData.imageUrl} className="w-full h-full object-cover" alt="Preview" /> : <div className="text-slate-800 opacity-20"><Icons.Shield size={64}/></div>}
                                                <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                                                    <span className="text-[9px] uppercase tracking-widest">Alterar Retrato</span>
                                                </div>
                                                <input type="file" accept="image/*" className="hidden" onChange={e => {
                                                    const f = e.target.files[0]; if(!f) return;
                                                    const r = new FileReader();
                                                    r.onload = ev => {
                                                        const i = new Image(); i.onload = () => {
                                                            const c = document.createElement('canvas'); c.width = 400; c.height = i.height * (400/i.width);
                                                            c.getContext('2d').drawImage(i, 0, 0, c.width, c.height);
                                                            setFormData(fd => ({ ...fd, imageUrl: c.toDataURL('image/jpeg', 0.5) }));
                                                        }; i.src = ev.target.result;
                                                    }; r.readAsDataURL(f);
                                                }} />
                                            </label>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1.5"><label className="text-[8px] uppercase text-slate-600 ml-1">Nível</label><input type="number" value={formData.level} onChange={e => setFormData({...formData, level: Number(e.target.value)})} className="stat-input" /></div>
                                                <div className="space-y-1.5"><label className="text-[8px] uppercase text-slate-600 ml-1">Dono</label><input type="text" disabled={role !== 'gm'} value={formData.ownerNickname} onChange={e => setFormData({...formData, ownerNickname: e.target.value})} className="stat-input text-[10px] text-orange-500 uppercase" /></div>
                                            </div>
                                        </div>
                                        <div className="md:col-span-8 space-y-10">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                                <div className="glass-panel p-6 rounded-2xl text-center shadow-inner group transition-colors hover:border-red-500/20">
                                                    <label className="text-[10px] uppercase text-red-500 block mb-4 italic opacity-60 font-black tracking-widest">Vitalidade Máxima</label>
                                                    <input type="number" value={formData.hpMax} onChange={e => setFormData({...formData, hpMax: Number(e.target.value), hp: Number(e.target.value)})} className="bg-transparent text-5xl font-magic text-red-500 text-center w-full outline-none" />
                                                </div>
                                                <div className="glass-panel p-6 rounded-2xl text-center shadow-inner group transition-colors hover:border-sky-500/20">
                                                    <label className="text-[10px] uppercase text-sky-500 block mb-4 italic opacity-60 font-black tracking-widest">Arcanismo Máximo</label>
                                                    <input type="number" value={formData.slotsMax} onChange={e => setFormData({...formData, slotsMax: Number(e.target.value), slots: Number(e.target.value)})} className="bg-transparent text-5xl font-magic text-sky-400 text-center w-full outline-none" />
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-6 gap-3">
                                                {['str','dex','con','int','wis','cha'].map(a => (
                                                    <div key={a} className="space-y-2">
                                                        <label className="text-[9px] uppercase text-slate-500 text-center block italic leading-none">{a}</label>
                                                        <input type="number" value={formData[a]} onChange={e => setFormData({...formData, [a]: Number(e.target.value)})} className="stat-input py-3 font-magic text-xl" />
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="space-y-3">
                                                <label className="text-[10px] uppercase text-slate-500 italic ml-2 tracking-widest">Saberes, Perícias e História</label>
                                                <textarea 
                                                    value={formData.history || ""} 
                                                    onChange={e => setFormData({...formData, history: e.target.value})} 
                                                    className="stat-input h-48 text-left text-sm font-serif italic custom-scrollbar resize-none p-6 leading-relaxed" 
                                                    placeholder="Descreve as façanhas e conhecimentos do teu herói..."
                                                />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8 border-t border-white/10 bg-slate-900/90 flex justify-center">
                                    <button 
                                        onClick={handleSaveChar} 
                                        disabled={isSaving} 
                                        className="w-full max-w-xl bg-orange-600 p-5 rounded-2xl text-2xl font-magic font-black uppercase tracking-[0.4em] shadow-[0_20px_50px_rgba(234,88,12,0.3)] hover:bg-orange-500 transition-all flex justify-center items-center gap-6 active:scale-95 disabled:opacity-50"
                                    >
                                        {isSaving ? <Icons.Loader size={32} /> : <Icons.Shield size={32} />} 
                                        {isSaving ? "A Selar..." : "Selar Escritura"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function StatusBar({ label, val, max, col, edit, onDelta }) {
            const barColor = col === 'red' ? 'from-red-800 to-red-400' : 'from-sky-800 to-sky-400';
            const shadowColor = col === 'red' ? 'shadow-red-900/20' : 'shadow-sky-900/20';
            
            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-end text-white">
                        <span className={`text-${col}-500 text-[10px] font-black uppercase tracking-[0.2em] mb-1 italic`}>{label}</span>
                        <div className="flex items-center gap-4">
                            {edit && <button onClick={()=>onDelta(-1)} className="text-slate-600 hover:text-white transition-colors text-2xl font-light">-</button>}
                            <span className="text-3xl font-magic font-black tabular-nums tracking-tighter">{val} <span className="text-slate-700 text-sm italic">/ {max}</span></span>
                            {edit && <button onClick={()=>onDelta(1)} className="text-slate-600 hover:text-white transition-colors text-2xl font-light">+</button>}
                        </div>
                    </div>
                    <div className={`h-2.5 bg-slate-950 rounded-full border border-white/5 overflow-hidden p-[1px] shadow-inner ${shadowColor}`}>
                        <div 
                            className={`h-full bg-gradient-to-r ${barColor} transition-all duration-700 rounded-full`} 
                            style={{width: `${Math.min(100, (val/max)*100)}%`}} 
                        />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
